document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }
  let __bundlerActive = true;

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Only surface errors during our own unpack/render phase. After that,
    // any errors are from the bundled app or external sources (e.g. wallet
    // extensions injecting inpage.js) and aren't bundle problems.
    if (!__bundlerActive) return;
    // Ignore errors from browser extensions even during unpack.
    if (e.filename && (e.filename.indexOf('chrome-extension://') === 0 || e.filename.indexOf('moz-extension://') === 0 || e.filename.indexOf('safari-web-extension://') === 0)) return;
    // Errors with no filename are almost always from injected extension scripts.
    if (!e.filename && !e.error) return;
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    __bundlerActive = false;
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ── Archivo (brand sans) — local variable TTF in /fonts ── */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 100 900;\n  font-stretch: 62.5% 125%;\n  font-display: swap;\n  src: url(\"779212d5-483d-43ad-8031-0299baeab0eb\") format('truetype-variations'),\n       url(\"779212d5-483d-43ad-8031-0299baeab0eb\") format('truetype');\n}\n\n:root {\n  /* ── Surfaces / neutrals ── */\n  --bg:           #FDFFFE;   /* page background — faint green-white */\n  --bg-white:     #FFFFFF;\n  --surface:      #FAFBFA;   /* base card */\n  --surface2:     #F2F8F5;   /* hover + tinted card */\n  --surface3:     #E5EEEA;   /* border-ish surface, rails */\n\n  /* ── Borders ── */\n  --border:       #E5EEEA;\n  --border-gray:  #E4E4E4;\n  --border2:      #C5DDD4;\n\n  /* ── Text ── */\n  --text:         #0C3124;   /* primary — deep forest green */\n  --text2:        #83968F;   /* secondary — muted sage */\n  --text3:        #B0C4BB;   /* tertiary — pale sage */\n  --text-dark:    #0D0D0D;   /* near-black used in checkout phone */\n\n  /* ── Brand accent (AllScale green) ── */\n  --accent:       #009859;\n  --accent-hover: #0CAA67;\n  --accent2:      #087E4C;   /* pressed */\n  --accent-glow:  #F2F8F5;\n  --accent-light: #E5FAF1;\n  --brand-light:  #12D16B;   /* bright brand green (logos/welcome) */\n\n  /* ── Semantic colors ── */\n  --orange:       #F59E0B;\n  --orange-soft:  rgba(245,158,11,0.12);\n  --red:          #E53E3E;\n  --red-soft:     rgba(229,62,62,0.08);\n  --green:        #009859;\n  --green-soft:   rgba(0,152,89,0.10);\n  --blue:         #2563EB;\n  --blue-soft:    rgba(59,130,246,0.10);\n  --purple:       #7C3AED;\n  --purple-soft:  rgba(139,92,246,0.10);\n\n  /* ── Shadow / elevation ── */\n  --shadow:       0 8px 40px rgba(0,0,0,0.10);\n  --shadow-md:    0 4px 24px rgba(0,0,0,0.08);\n  --shadow-sm:    0 2px 10px rgba(0,152,89,0.10);\n  --shadow-phone: 0 32px 80px rgba(0,0,0,0.5);\n\n  /* ── Radius ── */\n  --radius-card:  18px;\n  --radius-row:   12px;\n  --radius-modal: 27px;   /* desktop modal */\n  --radius-modal-sm: 24px;/* mobile / compact modal */\n  --radius-btn:   999px;  /* capsule */\n\n  /* ── Control heights ── */\n  --btn-h:        50px;\n  --btn-compact-h:39px;\n  --input-h:      48px;\n  --topbar-h:     64px;\n\n  /* ── Layout ── */\n  --sbar-w:       256px;    /* sidebar when expanded */\n  --sbar-w-sm:    106px;    /* sidebar when collapsed */\n  --app-max:      1205px;   /* desktop app shell width */\n  --app-center-w: 530px;    /* center content width */\n  --right-panel-w:419px;\n\n  /* ── Type families ── */\n  --font-sans:    'Archivo', system-ui, -apple-system, sans-serif;\n  --font-mono:    'DM Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n}\n\n/* ─────────────────────────────────────────────────────────────\n   BASE TYPE\n   Archivo is the workhorse. Weights: 400 body / 500 UI / 600–700 strong.\n   Body size is 14px default; numerics and page titles drop to 500 weight\n   with negative letter-spacing (-0.02em) for an editorial feel.\n   ───────────────────────────────────────────────────────────── */\n\nhtml, body {\n  font-family: var(--font-sans);\n  color: var(--text);\n  background: var(--bg);\n  font-size: 14px;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n/* Semantic text tokens — matches prototype's .t-* + .dash-* styles */\n\n.t-display {  /* large numerics on checkout phone */\n  font-size: 58px; font-weight: 700; letter-spacing: -0.04em;\n  color: var(--text-dark); line-height: 1;\n}\n.t-title {    /* page title on phone */\n  font-size: 32px; font-weight: 500; letter-spacing: -0.02em;\n  color: var(--text); line-height: 1.1;\n}\n.t-h1 {       /* dashboard section titles (store name, modal titles) */\n  font-size: 28px; font-weight: 500; letter-spacing: -0.02em;\n  color: var(--text);\n}\n.t-h2 {       /* card titles, \"Recent Orders\" */\n  font-size: 22px; font-weight: 500; letter-spacing: -0.02em;\n  color: var(--text);\n}\n.t-h3 {       /* stat-card values */\n  font-size: 28px; font-weight: 500; letter-spacing: -0.02em;\n  color: var(--text); line-height: 1;\n}\n.t-h4 {       /* subsection titles */\n  font-size: 20px; font-weight: 500; letter-spacing: -0.025em;\n  color: var(--text);\n}\n.t-body-lg {  /* primary list-row label */\n  font-size: 18px; font-weight: 500; letter-spacing: -0.02em;\n  color: var(--text);\n}\n.t-body {     /* button labels, main form input text */\n  font-size: 16px; font-weight: 500; letter-spacing: -0.02em;\n  color: var(--text);\n}\n.t-sm {       /* secondary body */\n  font-size: 14px; font-weight: 400;\n  color: var(--text2);\n}\n.t-caption {  /* metadata, timestamps */\n  font-size: 12px; font-weight: 400;\n  color: var(--text3);\n}\n.t-label {    /* form field labels */\n  font-size: 13px; font-weight: 500; color: var(--text2);\n}\n.t-eyebrow {  /* all-caps section eyebrow (rare) */\n  font-size: 10.5px; font-weight: 700; color: var(--text3);\n  text-transform: uppercase; letter-spacing: 0.08em;\n}\n\n/* Monospace */\ncode, .mono, .t-mono {\n  font-family: var(--font-mono);\n  font-size: 12px;\n  font-weight: 400;\n}\n\n/* Semantic HTML defaults */\nh1 { font-size: 28px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }\nh2 { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }\nh3 { font-size: 20px; font-weight: 500; letter-spacing: -0.025em; color: var(--text); }\nh4 { font-size: 18px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); }\np  { font-size: 14px; font-weight: 400; color: var(--text); }\nsmall { font-size: 12px; color: var(--text2); }\n\na { color: var(--accent); text-decoration: none; }\na:hover { color: var(--accent-hover); }\n\n/* Useful helpers */\n.text-mute  { color: var(--text2); }\n.text-faint { color: var(--text3); }\n.text-brand { color: var(--accent); }\n.text-danger{ color: var(--red); }\n.text-warn  { color: var(--orange); }\n<\u002Fstyle>\n<style>\n/* ─────────────────────────────────────────────\n   AllScale KYC — design tokens applied\n   ───────────────────────────────────────────── */\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml,body{font-family:var(--font-sans);background:#ffffff;color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}\nbutton,input,select,textarea{font-family:var(--font-sans)}\n\n/* SVG icon defs — single source of truth for inline glyphs */\n.icn{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;flex-shrink:0}\n\n/* Floating bottom nav (capsule) */\n.bottom-nav{position:fixed;left:24px;bottom:24px;z-index:100;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-btn);padding:8px 10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);max-width:calc(100vw - 24px)}\n.bottom-nav-brand{display:flex;align-items:center;gap:8px;padding:0 6px 0 4px;border-right:1px solid var(--border);height:32px}\n.bottom-nav-brand img{height:22px;display:block}\n.bottom-nav-brand .label{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.01em}\n.mode-btns{display:flex;gap:4px;flex-wrap:nowrap}\n.mode-btn{padding:7px 14px;border:none;border-radius:var(--radius-btn);background:transparent;color:var(--text2);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:-0.01em;white-space:nowrap}\n.mode-btn:hover{color:var(--text);background:var(--surface2)}\n.mode-btn.active{background:var(--accent);color:#fff;font-weight:500}\n.mode-btn.active:hover{background:var(--accent-hover);color:#fff}\n\n.container{max-width:600px;margin:0 auto;padding:32px 20px 140px}\n.section-title{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-left:4px}\n\n.card{background:#FAFBFA;border:none;border-radius:20px;padding:28px 24px;position:relative}\n.card.clip{overflow:hidden}\n\n.screen{display:none;animation:fadeUp .28s cubic-bezier(0.4,0,0.2,1)}\n.screen.active{display:block}\n@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}\n\n.back-btn{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:50%;background:#F2F8F5;border:none;cursor:pointer;margin-bottom:14px;padding:0;transition:background .15s;flex-shrink:0;font-size:0;color:transparent}\n.back-btn:hover{background:var(--surface2)}\n.back-btn img{width:8px;height:16px;display:block}\n\n.pg-title{font-size:28px;font-weight:500;color:var(--text);margin-bottom:8px;letter-spacing:-0.02em;line-height:1.15}\n.pg-title.compact{font-size:24px}\n.pg-subtitle{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.5}\n\n/* Buttons — capsule, AllScale */\n.btn-primary{width:100%;padding:14px 20px;border-radius:var(--radius-btn);border:none;background:var(--accent);color:#fff;font-size:18px;font-weight:500;cursor:pointer;letter-spacing:-0.01em;transition:background .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1.4}\n.btn-primary:hover{background:var(--accent-hover)}\n.btn-primary:active{background:var(--accent2)}\n.btn-primary.disabled{background:var(--surface3);color:var(--text2);cursor:default;pointer-events:none}\n.btn-secondary{width:100%;padding:14px 20px;border-radius:var(--radius-btn);border:none;background:var(--surface);color:var(--text);font-size:18px;font-weight:500;cursor:pointer;letter-spacing:-0.01em;transition:background .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1.4}\n.btn-secondary:hover{background:var(--surface2)}\n.btn-outline{width:100%;padding:14px 20px;border-radius:var(--radius-btn);border:1.5px solid var(--border);background:#fff;color:var(--text);font-size:18px;font-weight:500;cursor:pointer;letter-spacing:-0.01em;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:10px;line-height:1.4}\n.btn-outline:hover{border-color:var(--border2);background:var(--surface2)}\n.btn-row{display:flex;gap:10px;margin-top:16px}\n.btn-row>*{flex:1}\n\n/* Level badges — AllScale palette */\n.lvl-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:var(--radius-btn);font-size:12px;font-weight:600;letter-spacing:-0.01em;line-height:1.3}\n.lvl-badge.unverified{background:var(--orange-soft);color:var(--orange)}\n.lvl-badge.verified{background:var(--accent-light);color:var(--accent)}\n.lvl-badge.business{background:var(--blue-soft);color:var(--blue)}\n.lvl-badge.manual-admin{background:rgba(124,58,237,0.10);color:var(--purple)}\n.lvl-badge .dot{width:6px;height:6px;border-radius:50%;background:currentColor}\n\n.divider{height:1px;background:var(--border);margin:16px 0}\n\n/* Step indicator — segmented progress (AllScale design system) */\n.step-bar{margin-bottom:24px}\n.step-bar-meta{font-size:14px;color:var(--text2);font-weight:400;margin-bottom:10px;letter-spacing:-0.01em}\n.step-bar-track{display:flex;align-items:center;gap:6px}\n.step-bar-seg{flex:1;height:4px;border-radius:99px;background:var(--border);transition:background .25s ease}\n.step-bar-seg.done{background:var(--accent)}\n\n/* Type cards (Step 2) */\n.type-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-card);padding:20px;margin-bottom:12px;cursor:pointer;transition:border-color .15s,background .15s}\n.type-card:hover{border-color:var(--border2);background:var(--surface)}\n.type-card.selected{border-color:var(--accent);background:var(--accent-glow)}\n.type-card.kyb.selected{border-color:var(--blue);background:var(--blue-soft)}\n.type-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}\n.type-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}\n.type-icon.kyc{background:var(--accent-light);color:var(--accent)}\n.type-icon.kyb{background:var(--blue-soft);color:var(--blue)}\n.type-icon .icn{font-size:22px}\n.type-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;letter-spacing:-0.01em}\n.type-duration{font-size:12px;color:var(--text2);font-weight:500;display:inline-flex;align-items:center;gap:5px}\n.type-req{font-size:13px;color:var(--text2);line-height:1.7;list-style:none;padding:0}\n.type-req li{padding-left:18px;position:relative;margin-bottom:2px}\n.type-req li::before{content:'';position:absolute;left:6px;top:11px;width:4px;height:4px;border-radius:50%;background:var(--border2)}\n\n/* Inline checkbox toggle */\n.offramp-toggle{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#FAFBFA;border-radius:14px;cursor:pointer;border:1.5px solid var(--border);transition:border-color .15s,background .15s}\n.offramp-toggle:hover{border-color:var(--border2);background:var(--surface)}\n.offramp-toggle.on{border-color:var(--accent);background:var(--accent-glow)}\n.offramp-check{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff;color:#fff}\n.offramp-toggle.on .offramp-check{background:var(--accent);border-color:var(--accent)}\n.offramp-label{flex:1;font-size:14px;font-weight:500;color:var(--text);letter-spacing:-0.01em}\n.offramp-sub{font-size:12px;color:var(--text2);margin-top:2px;font-weight:400;letter-spacing:0}\n\n/* Form */\n.form-group{margin-bottom:18px;text-align:left}\n.form-label{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:4px;letter-spacing:-0.01em}\n.form-label .req{color:var(--red)}\n.form-input{width:100%;height:48px;border:1.5px solid var(--border);border-radius:12px;padding:0 16px;font-size:15px;color:var(--text);background:#FAFBFA;outline:none;transition:border-color .15s,background .15s;letter-spacing:-0.01em}\n.form-input:focus{border-color:var(--accent);background:var(--accent-glow)}\n.form-input::placeholder{color:var(--text3)}\n.form-input:not(textarea):not(select){font-family:var(--font-sans)}\ntextarea.form-input{padding:14px 16px;resize:none;line-height:1.5}\n.form-select{appearance:none;background-image:url(\"data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%2383968F' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\");background-repeat:no-repeat;background-position:right 16px center;padding-right:42px;cursor:pointer}\n\n/* ── Custom dropdown (matches screenshot spec) ── */\n.dd{position:relative;width:100%}\n.dd-trigger{width:100%;height:50px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;font-size:16px;font-weight:500;color:var(--text);font-family:var(--font-sans);letter-spacing:-0.01em;transition:background .15s,border-color .15s;text-align:left}\n.dd-trigger:hover{background:var(--surface2)}\n.dd-trigger .dd-value{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.dd-trigger .dd-chev{flex-shrink:0;color:var(--text);width:16px;height:16px}\n.dd-panel{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:8px 4px;max-height:240px;overflow-y:auto;z-index:50;box-shadow:0 4px 24px rgba(12,49,36,.06);display:none}\n.dd-panel.open{display:block;animation:ddIn .18s ease}\n@keyframes ddIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}\n.dd-option{margin:2px 4px;padding:10px 18px;font-size:16px;font-weight:500;color:var(--text);cursor:pointer;letter-spacing:-0.01em;border-radius:12px;transition:background .12s}\n.dd-option:hover{background:var(--surface2)}\n.dd-option.selected{color:var(--accent);background:var(--accent-glow)}\n.dd-panel::-webkit-scrollbar{width:6px}\n.dd-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}\n.dd-panel::-webkit-scrollbar-track{background:transparent}\n\n/* Matrix table */\n.matrix-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}\n.matrix-table th,.matrix-table td{padding:11px 8px;text-align:center;border-bottom:1px solid var(--border);letter-spacing:-0.01em}\n.matrix-table th{font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;background:transparent;white-space:nowrap}\n.matrix-table tr:last-child td{border-bottom:none}\n.matrix-table th:first-child,.matrix-table td:first-child{text-align:left;padding-left:14px;font-weight:500}\n.matrix-table td:first-child{color:var(--text)}\n.matrix-table td{color:var(--text2);font-weight:400}\n.matrix-table td.yes{color:var(--accent);font-weight:500}\n.matrix-table td.no{color:var(--text3);font-weight:400}\n.matrix-table tr.current td{background:var(--accent-glow);color:var(--text)}\n.matrix-table tr.current th{background:var(--accent);color:#fff;border-radius:0}\n.matrix-table thead th.current{color:var(--accent);background:var(--accent-glow)}\n\n/* Alert boxes */\n.alert-box{border-radius:14px;padding:14px 16px;margin-bottom:16px;border:1px solid transparent}\n.alert-box.warn{background:var(--orange-soft);border-color:rgba(245,158,11,.18)}\n.alert-box.info{background:var(--blue-soft);border-color:rgba(37,99,235,.14)}\n.alert-box.success{background:var(--accent-light);border-color:rgba(0,152,89,.16)}\n.alert-title{font-size:13.5px;font-weight:600;margin-bottom:4px;letter-spacing:-0.01em}\n.alert-text{font-size:13px;line-height:1.55;letter-spacing:-0.005em}\n.alert-box.warn .alert-title{color:#92590C}\n.alert-box.warn .alert-text{color:#7A4B0B}\n.alert-box.info .alert-title{color:#1D4FBA}\n.alert-box.info .alert-text{co
