\n        <\u002Ful>\n      <\u002Fdiv>\n\n      <div style=\"margin:18px 0 10px;font-size:12px;color:var(--text2);text-align:center;letter-spacing:-0.005em\">What can you do at each level?<\u002Fdiv>\n      <div style=\"background:var(--surface);border-radius:14px;padding:6px 4px;margin-bottom:18px\">\n        <table class=\"matrix-table\" id=\"step2-matrix\"><\u002Ftable>\n      <\u002Fdiv>\n\n      <button class=\"btn-primary\" id=\"step2-continue\" onclick=\"gotoStep(3)\">Continue<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══════════ SCREEN: Step 3 — Profile ═══════════ -->\n  <div class=\"screen\" id=\"screen-step3\">\n    <button class=\"back-btn\" onclick=\"gotoStep(2)\" aria-label=\"Back\"><img src=\"4ec76604-5b06-4ee4-8fef-fe840ddfbca0\" alt=\"\"><\u002Fbutton>\n    <div class=\"card\">\n      <div class=\"step-bar\" id=\"step-bar-3\"><\u002Fdiv>\n      <div class=\"pg-title compact\" id=\"step3-title\">Your information<\u002Fdiv>\n      <div class=\"pg-subtitle\" id=\"step3-sub\">We'll cross-check this against your ID in the next step.<\u002Fdiv>\n\n      <div id=\"step3-basic\">\n        <div class=\"form-group\"><div class=\"form-label\" id=\"step3-name-label\">Full name <span class=\"req\">*<\u002Fspan><\u002Fdiv><input class=\"form-input\" id=\"step3-name-input\" value=\"John Doe\"><\u002Fdiv>\n        <div class=\"form-group\" id=\"step3-dob-group\"><div class=\"form-label\">Date of birth <span class=\"req\">*<\u002Fspan><\u002Fdiv><input class=\"form-input\" value=\"1990-04-15\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"step3-company\" style=\"display:none\">\n        <div class=\"form-group\">\n          <div class=\"form-label\">Company name <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n          <input class=\"form-input\" value=\"Example Trading Ltd.\">\n        <\u002Fdiv>\n        <div class=\"form-group\">\n          <div class=\"form-label\">Company registration number <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n          <input class=\"form-input\" value=\"HRB 123456\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"step3-freelancer-section\" style=\"margin:8px 0 0;padding-top:18px;border-top:1px solid var(--border)\">\n        <div class=\"offramp-toggle\" id=\"freelancer-toggle\" onclick=\"toggleFreelancer()\">\n          <div class=\"offramp-check\" id=\"freelancer-check\"><svg class=\"icn\" style=\"font-size:13px;display:none\" id=\"freelancer-check-icn\"><use href=\"#i-check\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n          <div>\n            <div class=\"offramp-label\">I'm a freelancer / sole proprietor<\u002Fdiv>\n            <div class=\"offramp-sub\">Tell us a bit about your business and enjoy the perks below.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"freelancer-benefits\" style=\"display: none; margin-top: 10px; background: var(--accent-light); border-radius: 14px; padding: 14px 16px; background-color: rgb(255, 255, 255); border-width: 1px; border-style: none; border-color: rgb(229, 238, 234)\">\n          <div style=\"font-size:10.5px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px\">Benefits<\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:10px\">\n            <div style=\"width:30px;height:30px;border-radius:8px;background:#fff;color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg class=\"icn\" style=\"font-size:16px\"><use href=\"#i-bolt\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div>\n              <div style=\"font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.01em\">Priority verification review<\u002Fdiv>\n              <div style=\"font-size:12px;color:var(--text2);line-height:1.5\">Your submission jumps ahead in the review queue.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-start;gap:12px\">\n            <div style=\"width:30px;height:30px;border-radius:8px;background:#fff;color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg class=\"icn\" style=\"font-size:16px\"><use href=\"#i-rocket\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n            <div>\n              <div style=\"font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.01em\">Faster KYB upgrade later<\u002Fdiv>\n              <div style=\"font-size:12px;color:var(--text2);line-height:1.5\">When you upgrade to Business Verified, your industry, websites, and turnover are auto-filled.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"step3-profile\" style=\"display:none\">\n        <div id=\"step3-profile-heading\" style=\"margin:20px 0 14px\">\n          <div style=\"font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-0.01em\">Business profile<\u002Fdiv>\n          <div style=\"font-size:12px;color:var(--text2);line-height:1.5\" id=\"step3-profile-hint\">Helps us tailor compliance checks and offer the right services.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-group\">\n          <div class=\"form-label\">Primary industry <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n          <div class=\"dd\" data-dd=\"\" data-options=\"[&quot;E-commerce / Marketplace&quot;,&quot;SaaS / Software&quot;,&quot;Financial Services&quot;,&quot;Content / Creator Economy&quot;,&quot;Consulting / Professional Services&quot;,&quot;Media / Entertainment&quot;,&quot;Manufacturing&quot;,&quot;Other&quot;]\" data-value=\"E-commerce / Marketplace\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-group\">\n          <div class=\"form-label\" id=\"step3-web-label\">Websites &amp; social <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n          <input class=\"form-input\" value=\"https://example.com\" style=\"margin-bottom:6px\">\n          <input class=\"form-input\" placeholder=\"Add another (App Store / LinkedIn / shop link / …)\">\n          <div style=\"font-size:12px;color:var(--text2);margin-top:8px;line-height:1.5\" id=\"step3-web-hint\">Add all that apply: website, app, social media, shop links.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-group\">\n          <div class=\"form-label\">Expected monthly turnover <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n          <div class=\"dd\" data-dd=\"\" data-options=\"[&quot;Less than $10,000&quot;,&quot;$10,000 – $50,000&quot;,&quot;$50,000 – $200,000&quot;,&quot;$200,000 – $1,000,000&quot;,&quot;More than $1,000,000&quot;]\" data-value=\"$50,000 – $200,000\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button class=\"btn-primary\" onclick=\"gotoStep(4)\" style=\"margin-top:8px\">Continue<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══════════ SCREEN: Step 4 — Sumsub ═══════════ -->\n  <div class=\"screen\" id=\"screen-step4\">\n    <button class=\"back-btn\" onclick=\"gotoStep(3)\" aria-label=\"Back\"><img src=\"4ec76604-5b06-4ee4-8fef-fe840ddfbca0\" alt=\"\"><\u002Fbutton>\n\n    <div class=\"card\">\n      <div class=\"step-bar\" id=\"step-bar-4\"><\u002Fdiv>\n      <div class=\"pg-title compact\">Verify documents<\u002Fdiv>\n      <div class=\"pg-subtitle\" id=\"step4-sub\">Follow the steps to upload your ID and complete the face check.<\u002Fdiv>\n\n      <div class=\"sumsub-frame\" style=\"background-color: rgb(250, 251, 250); border-style: none\">\n        <div class=\"sumsub-frame-label\" style=\"border-style: none; background-color: rgb(246, 246, 246)\">\n          <span class=\"pulse\" style=\"background-color: rgb(0, 152, 89)\"><\u002Fspan>\n          <span style=\"color: rgb(0, 0, 0)\">Sumsub WebSDK · iframe<\u002Fspan>\n          <span class=\"url\" style=\"color: rgb(0, 0, 0)\">api.sumsub.com<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"padding: 14px 18px 0; color: rgb(252, 252, 252)\">\n          <div class=\"step-bar-meta\" id=\"verify-progress-text\" style=\"margin-bottom:8px\">Ready to start<\u002Fdiv>\n          <div class=\"step-bar-track\" id=\"verify-progress-track\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"sumsub-mock\" id=\"sumsub-content\" style=\"background-color: rgb(252, 252, 252)\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"height:18px\"><\u002Fdiv>\n      <button class=\"btn-primary\" id=\"verify-next-btn\" onclick=\"nextVerifyStep()\">Start<\u002Fbutton>\n      <button class=\"btn-secondary\" id=\"verify-back-btn\" onclick=\"prevVerifyStep()\" style=\"display:none;margin-top:10px\">Back<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══════════ SCREEN: Result ═══════════ -->\n  <div class=\"screen\" id=\"screen-result\">\n    <div class=\"card\">\n      <div class=\"completion\" id=\"result-content\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══════════ SCREEN: Status ═══════════ -->\n  <div class=\"screen\" id=\"screen-status\">\n    <button class=\"back-btn\" onclick=\"goScreen('entry')\" aria-label=\"Back\"><img src=\"4ec76604-5b06-4ee4-8fef-fe840ddfbca0\" alt=\"\"><\u002Fbutton>\n    <div class=\"pg-title\">Verification status<\u002Fdiv>\n    <div class=\"pg-subtitle\">Your current level and what it unlocks.<\u002Fdiv>\n\n    <div class=\"card\" id=\"status-overview\"><\u002Fdiv>\n\n    <div style=\"height:22px\"><\u002Fdiv>\n    <div class=\"section-title\">Feature × Level<\u002Fdiv>\n    <div class=\"card\" style=\"padding:14px 8px\">\n      <table class=\"matrix-table\" id=\"status-matrix\"><\u002Ftable>\n    <\u002Fdiv>\n\n    <div style=\"height:22px\"><\u002Fdiv>\n    <div class=\"section-title\">Error scenarios (Demo)<\u002Fdiv>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:8px\">\n      <button class=\"btn-outline\" onclick=\"showResult('success-verified')\">Simulate: Verified (KYC passed)<\u002Fbutton>\n      <button class=\"btn-outline\" onclick=\"showResult('success-kyb')\">Simulate: Business verified (KYB passed)<\u002Fbutton>\n      <button class=\"btn-outline\" onclick=\"showResult('retry')\">Simulate: Retry required<\u002Fbutton>\n      <button class=\"btn-outline\" onclick=\"showResult('final')\">Simulate: Final reject<\u002Fbutton>\n      <button class=\"btn-outline\" onclick=\"showResult('pending')\">Simulate: Pending review (KYB)<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══════════ SCREEN: Blocked Demo ═══════════ -->\n  <div class=\"screen\" id=\"screen-blocked-demo\">\n    <button class=\"back-btn\" onclick=\"goScreen('entry')\" aria-label=\"Back\"><img src=\"4ec76604-5b06-4ee4-8fef-fe840ddfbca0\" alt=\"\"><\u002Fbutton>\n    <div class=\"pg-title\">Feature blocked prompts<\u002Fdiv>\n    <div class=\"pg-subtitle\">Demos of how users get nudged when a feature requires higher verification.<\u002Fdiv>\n\n    <div class=\"section-title\">Try a scenario<\u002Fdiv>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:8px\">\n      <button class=\"btn-outline\" onclick=\"showBlocked('offramp')\">\n        <svg class=\"icn\" style=\"font-size:16px;color:var(--accent)\"><use href=\"#i-bank\"><\u002Fuse><\u002Fsvg>\n        Tap \"Withdraw to bank\"\n      <\u002Fbutton>\n      <button class=\"btn-outline\" onclick=\"showBlocked('payroll')\">\n        <svg class=\"icn\" style=\"font-size:16px;color:var(--blue)\"><use href=\"#i-payroll\"><\u002Fuse><\u002Fsvg>\n        Tap \"Send payroll\"\n      <\u002Fbutton>\n      <button class=\"btn-outline\" onclick=\"showBlocked('onramp')\">\n        <svg class=\"icn\" style=\"font-size:16px;color:var(--accent)\"><use href=\"#i-card-down\"><\u002Fuse><\u002Fsvg>\n        Tap \"Top up with card\"\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"card\" id=\"blocked-result\" style=\"display:none;margin-top:20px\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ═══════════ SCREEN: Admin — Manual KYB ═══════════ -->\n  <div class=\"screen\" id=\"screen-admin\">\n    <button class=\"back-btn\" onclick=\"goScreen('entry')\" aria-label=\"Back\"><img src=\"4ec76604-5b06-4ee4-8fef-fe840ddfbca0\" alt=\"\"><\u002Fbutton>\n    <div class=\"pg-title\">Admin: Manual KYB<\u002Fdiv>\n    <div class=\"pg-subtitle\">Mark merchants as Business Verified based on offline / legacy materials (PRD §7.2).<\u002Fdiv>\n\n    <div class=\"alert-box info\">\n      <div class=\"alert-title\">When to use this<\u002Fdiv>\n      <div class=\"alert-text\">Legacy merchants onboarded before productized KYB, or VIP custom reviews. Not a bypass — still requires offline docs &amp; audit notes.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section-title\">Select merchant<\u002Fdiv>\n    <div class=\"card\" style=\"padding:12px\">\n      <div class=\"admin-list-item selected\">\n        <div class=\"admin-list-avatar\">AC<\u002Fdiv>\n        <div class=\"admin-list-info\">\n          <div class=\"admin-list-name\">Acme Commerce GmbH<\u002Fdiv>\n          <div class=\"admin-list-sub\">onboarded Mar 2024 · no KYB yet<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"lvl-badge unverified\" style=\"font-size:11px;padding:3px 9px\">Unverified<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"admin-list-item\">\n        <div class=\"admin-list-avatar\">BP<\u002Fdiv>\n        <div class=\"admin-list-info\">\n          <div class=\"admin-list-name\">Bright Pixels Ltd.<\u002Fdiv>\n          <div class=\"admin-list-sub\">onboarded Jan 2024 · legacy review Q2<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"lvl-badge unverified\" style=\"font-size:11px;padding:3px 9px\">Unverified<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"height:18px\"><\u002Fdiv>\n    <div class=\"section-title\">Offline materials &amp; audit<\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"form-group\">\n        <div class=\"form-label\">Company registration country <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n        <div class=\"dd\" data-dd=\"\" data-options=\"[&quot;Germany&quot;,&quot;Portugal&quot;,&quot;United Kingdom&quot;]\" data-value=\"Germany\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <div class=\"form-label\">Registration number <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n        <input class=\"form-input\" value=\"HRB 987654\">\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <div class=\"form-label\">Business address <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n        <input class=\"form-input\" value=\"Unter den Linden 77, 10117 Berlin\">\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <div class=\"form-label\">Industry / Website / Monthly turnover <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n        <input class=\"form-input\" value=\"E-commerce · example-commerce.de · $50k–$200k\">\n      <\u002Fdiv>\n      <div class=\"form-group\">\n        <div class=\"form-label\">Director / UBO info <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n        <input class=\"form-input\" value=\"Maria Schmidt (CEO, 80%)\">\n      <\u002Fdiv>\n\n      <div class=\"form-group\">\n        <div class=\"form-label\">Offline documents <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n        <div class=\"sumsub-upload-zone\">\n          <svg class=\"icn\"><use href=\"#i-paperclip\"><\u002Fuse><\u002Fsvg>\n          <div style=\"font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.01em\">Drop files or tap to upload<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text2);margin-top:4px\">Registration cert, director IDs, address proof · PDF / JPG / PNG<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--accent-glow);border-radius:10px;margin-top:6px\">\n          <svg class=\"icn\" style=\"font-size:16px;color:var(--accent)\"><use href=\"#i-doc\"><\u002Fuse><\u002Fsvg>\n          <span style=\"flex:1;font-size:13px;color:var(--text);letter-spacing:-0.01em\">Acme_registration_2024.pdf<\u002Fspan>\n          <span style=\"font-size:11px;color:var(--text2);font-family:var(--font-mono)\">2.1 MB<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"form-group\">\n        <div class=\"form-label\">Audit notes <span class=\"req\">*<\u002Fspan><\u002Fdiv>\n        <textarea class=\"form-input\" style=\"height:84px\">Reviewed by BD (Zhang San) on 2026-04-18. Materials received via Feishu. Cross-referenced with handelsregister.de.<\u002Ftextarea>\n      <\u002Fdiv>\n\n      <div class=\"form-group\">\n        <div class=\"form-label\">Granted level<\u002Fdiv>\n        <div class=\"dd\" data-dd=\"\" data-options=\"[&quot;Business Verified (same as Sumsub KYB)&quot;,&quot;Business Verified — Off-Ramp only&quot;,&quot;Business Verified — limited ($50k/mo cap)&quot;]\" data-value=\"Business Verified (same as Sumsub KYB)\"><\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--text2);margin-top:8px;line-height:1.5\">Admin can override per-feature limits based on risk assessment.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"alert-box warn\">\n        <div class=\"alert-text\">This action is audited. Your name, timestamp, and notes will be permanently logged and visible in the merchant's verification history.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"btn-row\">\n        <button class=\"btn-secondary\" onclick=\"goScreen('entry')\">Cancel<\u002Fbutton>\n        <button class=\"btn-primary\" onclick=\"adminMarkKyb()\">Mark as Business Verified<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<!-- Toast -->\n<div id=\"toast-container\"><\u002Fdiv>\n\n<!-- Blocked sheet -->\n<div class=\"sheet-overlay\" id=\"blocked-sheet-overlay\" onclick=\"closeSheet('blocked-sheet')\"><\u002Fdiv>\n<div class=\"sheet modal-top\" id=\"blocked-sheet\" style=\"padding: 0px\">\n  <div class=\"sheet-header\" style=\"justify-content:center\">\n    <span class=\"sheet-title\" id=\"blocked-sheet-title\" style=\"font-size: 24px;text-align:center\">KYC Required<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"sheet-body\" id=\"blocked-sheet-body\" style=\"padding-bottom:24px\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n/* ═══════════ STATE ═══════════ */\nconst state = {\n  level: 'unverified',   // 'unverified' | 'verified' | 'kyb' | 'kyb-manual' | 'final-rejected'\n  flowType: 'kyc',\n  isFreelancer: false,\n  stepIdx: 0,\n  currentStep: 1,\n};\n\n/* ═══════════ LEVEL META ═══════════ */\nconst LEVEL_LABEL = { unverified:'Unverified', verified:'Verified', kyb:'Business Verified', 'kyb-manual':'Business Verified', 'final-rejected':'Locked' };\nconst LEVEL_BADGE_CLASS = { unverified:'unverified', verified:'verified', kyb:'business', 'kyb-manual':'business', 'final-rejected':'unverified' };\nconst LEVEL_ICON = { unverified:'#i-warn', verified:'#i-shield-check', kyb:'#i-building', 'kyb-manual':'#i-building', 'final-rejected':'#i-lock' };\nconst LEVEL_ICON_CLASS = { unverified:'unverified', verified:'verified', kyb:'business', 'kyb-manual':'business', 'final-rejected':'unverified' };\n\n/* ═══════════ MATRIX (PRD §4.4) ═══════════ */\nconst MATRIX = [\n  { feat:'Off-Ramp (Fiat Out)',   unverified:'—',                      verified:'Daily $500k',            kyb:'Daily $500k' },\n  { feat:'On-Ramp (Fiat In)',     unverified:'—',                      verified:'Daily $500k',            kyb:'Daily $500k' },\n  { feat:'Payroll (Batch Send)',  unverified:'—',                      verified:'—',                      kyb:'Unlimited' },\n];\nconst LEVEL_COLS = ['unverified','verified','kyb'];\nconst LEVEL_HEADER = { unverified:'Unverified', verified:'Verified', kyb:'Business' };\n\nfunction renderMatrix(tableEl, highlightLevel) {\n  const cols = LEVEL_COLS;\n  const norm = highlightLevel === 'kyb-manual' ? 'kyb' : highlightLevel;\n  let html = '<thead><tr><th>Feature<\u002Fth>';\n  cols.forEach(c => { html += `<th class=\"${c===norm?'current':''}\">${LEVEL_HEADER[c]}<\u002Fth>`; });\n  html += '<\u002Ftr><\u002Fthead><tbody>';\n  MATRIX.forEach(row => {\n    html += `<tr${''}><td>${row.feat}<\u002Ftd>`;\n    cols.forEach(c => {\n      const v = row[c];\n      let cls = '';\n      if (v === '—') cls = 'no';\n      else if (v === 'Unlimited' || v.startsWith('Daily')) cls = 'yes';\n      html += `<td class=\"${cls}\">${v}<\u002Ftd>`;\n    });\n    html += '<\u002Ftr>';\n  });\n  html += '<\u002Ftbody>';\n  tableEl.innerHTML = html;\n}\n\n/* ═══════════ NAV ═══════════ */\nfunction goScreen(id) {\n  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));\n  const el = document.getElementById('screen-' + id);\n  if (el) el.classList.add('active');\n  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));\n  // best-effort highlight in topbar\n  const map = { entry:0, status:2, 'blocked-demo':3, admin:4 };\n  const idx = map[id];\n  if (idx !== undefined) document.querySelectorAll('.mode-btn')[idx].classList.add('active');\n  if (id === 'entry') renderEntry();\n  if (id === 'status') renderStatus();\n  if (id === 'blocked-demo') document.getElementById('blocked-result').style.display = 'none';\n  window.scrollTo({top:0, behavior:'smooth'});\n}\n\nfunction resetAll() {\n  state.level = 'unverified'; state.flowType = 'kyc'; state.isFreelancer = false;\n  state.stepIdx = 0; state.currentStep = 1;\n  const frToggle = document.getElementById('freelancer-toggle');\n  const frCheck = document.getElementById('freelancer-check-icn');\n  if (frToggle) frToggle.classList.remove('on');\n  if (frCheck) frCheck.style.display = 'none';\n  const profile = document.getElementById('step3-profile');\n  const benefits = document.getElementById('freelancer-benefits');\n  if (profile) profile.style.display = 'none';\n  if (benefits) benefits.style.display = 'none';\n  toast('Demo reset');\n  goScreen('entry');\n}\n\n/* ═══════════ ENTRY ═══════════ */\nfunction renderEntry() {\n  const levelEl = document.getElementById('entry-level-name');\n  const badgeEl = document.getElementById('entry-level-badge');\n  const alertEl = document.getElementById('entry-alert');\n  const ctaText = document.getElementById('entry-cta-text');\n\n  const LEVEL_SUBTITLE = { unverified:'KYC Required', verified:'Personal Verified', kyb:'Business Verified', 'kyb-manual':'Business Verified', 'final-rejected':'Account Locked' };\n  levelEl.textContent = LEVEL_SUBTITLE[state.level];\n  badgeEl.className = 'lvl-badge ' + LEVEL_BADGE_CLASS[state.level];\n  badgeEl.innerHTML = `<span class=\"dot\"><\u002Fspan>${LEVEL_LABEL[state.level]}`;\n\n  if (state.level === 'unverified') {\n    alertEl.className = 'alert-box warn';\n    alertEl.innerHTML = '<div class=\"alert-text\"><span style=\"color:rgb(0, 0, 0)\">Complete verification to unlock fiat withdrawals, higher limits, and business features.<\u002Fspan><\u002Fdiv>';\n    ctaText.textContent = 'Start verification';\n  } else if (state.level === 'final-rejected') {\n    alertEl.className = 'alert-box warn';\n    alertEl.innerHTML = '<div class=\"alert-title\">Verification denied<\u002Fdiv><div class=\"alert-text\">Your account is locked from re-verification. Please contact support if you believe this is an error.<\u002Fdiv>';\n    ctaText.textContent = 'Contact support';\n  } else if (state.level === 'verified') {\n    alertEl.className = 'alert-box success';\n    alertEl.innerHTML = '<div class=\"alert-title\">Fully verified for personal use<\u002Fdiv><div class=\"alert-text\">Fiat withdrawal and full personal features unlocked. Need business features? Switch to KYB.<\u002Fdiv>';\n    ctaText.textContent = 'Verify as business';\n  } else {\n    alertEl.className = 'alert-box success';\n    alertEl.innerHTML = '<div class=\"alert-title\">Business verified<\u002Fdiv><div class=\"alert-text\">All business features unlocked, including Payroll and fiat in/out.<\u002Fdiv>';\n    ctaText.textContent = 'View details';\n  }\n\n  const matrixLvl = (state.level === 'unverified' || state.level === 'final-rejected') ? null : state.level;\n  renderMatrix(document.getElementById('entry-matrix'), matrixLvl);\n}\n\nfunction toggleMatrix() {\n  const body = document.getElementById('entry-matrix-body');\n  const chev = document.getElementById('entry-matrix-chevron');\n  const open = body.style.gridTemplateRows && body.style.gridTemplateRows !== '0fr';\n  body.style.gridTemplateRows = open ? '0fr' : '1fr';\n  chev.style.transform = open ? 'rotate(0deg)' : 'rotate(180deg)';\n}\n\n/* ═══════════ START / RETRY ═══════════ */\nfunction startFlow() {\n  if (state.level === 'kyb' || state.level === 'kyb-manual') { goScreen('status'); return; }\n  state.flowType = state.level === 'verified' ? 'kyb' : 'kyc';\n  state.currentStep = 1; state.stepIdx = 0;\n  renderStepBar();\n  goScreen('step1');\n}\nfunction retryVerification() {\n  state.currentStep = 4; state.stepIdx = 0;\n  renderStepBar(); renderVerifyStep();\n  goScreen('step4');\n}\n\n/* ═══════════ STEP BAR ═══════════ */\nconst STEP_LABELS = ['Country','Type','Profile','Verify'];\nfunction renderStepBar() {\n  const total = STEP_LABELS.length;\n  [1,2,3,4].forEach(n => {\n    const el = document.getElementById('step-bar-' + n);\n    if (!el) return;\n    const cur = state.currentStep;\n    const label = STEP_LABELS[cur - 1];\n    const segs = STEP_LABELS.map((_,i) => `<div class=\"step-bar-seg ${i < cur ? 'done' : ''}\"><\u002Fdiv>`).join('');\n    el.innerHTML = `<div class=\"step-bar-meta\">Step ${cur} of ${total} · ${label}<\u002Fdiv><div class=\"step-bar-track\">${segs}<\u002Fdiv>`;\n  });\n}\n\nfunction gotoStep(n) {\n  state.currentStep = n;\n  renderStepBar();\n  if (n === 2) { renderMatrix(document.getElementById('step2-matrix'), null); refreshTypeSelection(); }\n  if (n === 3) {\n    const isKyb = state.flowType === 'kyb';\n    const showProfile = isKyb || (state.flowType === 'kyc' && state.isFreelancer);\n    document.getElementById('step3-company').style.display = isKyb ? 'block' : 'none';\n    document.getElementById('step3-freelancer-section').style.display = isKyb ? 'none' : 'block';\n    document.getElementById('step3-profile').style.display = showProfile ? 'block' : 'none';\n    const profileHeading = document.getElementById('step3-profile-heading');\n    if (isKyb) { profileHeading.style.borderTop = '1px solid var(--border)'; profileHeading.style.paddingTop = '18px'; }\n    else { profileHeading.style.borderTop = ''; profileHeading.style.paddingTop = ''; }\n    document.getElementById('step3-title').textContent = isKyb ? 'Business information' : 'Your information';\n    document.getElementById('step3-sub').textContent = isKyb\n      ? 'Your company details. Industry and volume help us tailor compliance checks.'\n      : \"We'll cross-check this against your ID in the next step.\";\n    document.getElementById('step3-name-label').innerHTML = isKyb\n      ? 'Legal representative <span class=\"req\">*<\u002Fspan>'\n      : 'Full name <span class=\"req\">*<\u002Fspan>';\n    document.getElementById('step3-dob-group').style.display = isKyb ? 'none' : 'block';\n    document.getElementById('step3-profile-hint').textContent = isKyb\n      ? 'Helps us tailor compliance checks and offer the right services.'\n      : 'As a freelancer / sole proprietor, tell us about what you do.';\n    document.getElementById('step3-web-hint').textContent = isKyb\n      ? 'Add all that apply: website, app, social media, shop links.'\n      : 'Personal site, portfolio, shop, social profiles — whatever represents your work.';\n  }\n  if (n === 4) { state.stepIdx = 0; renderVerifyStep(); }\n  goScreen('step' + n);\n}\n\n/* ═══════════ STEP 2 — TYPE ═══════════ */\nfunction selectType(t) {\n  state.flowType = t;\n  if (t === 'kyb' && state.isFreelancer) {\n    state.isFreelancer = false;\n    document.getElementById('freelancer-toggle').classList.remove('on');\n    document.getElementById('freelancer-check-icn').style.display = 'none';\n  }\n  refreshTypeSelection();\n}\nfunction refreshTypeSelection() {\n  document.getElementById('type-kyc').classList.toggle('selected', state.flowType === 'kyc');\n  document.getElementById('type-kyb').classList.toggle('selected', state.flowType === 'kyb');\n}\nfunction toggleFreelancer() {\n  state.isFreelancer = !state.isFreelancer;\n  const toggle = document.getElementById('freelancer-toggle');\n  const checkIcn = document.getElementById('freelancer-check-icn');\n  toggle.classList.toggle('on', state.isFreelancer);\n  checkIcn.style.display = state.isFreelancer ? 'inline-block' : 'none';\n  const profile = document.getElementById('step3-profile');\n  const benefits = document.getElementById('freelancer-benefits');\n  if (profile) profile.style.display = state.isFreelancer ? 'block' : 'none';\n  if (benefits) benefits.style.display = state.isFreelancer ? 'block' : 'none';\n}\n\n/* ═══════════ STEP 4 — VERIFY (Sumsub mock) ═══════════ */\nfunction getVerifyFlow() {\n  if (state.flowType === 'kyb') {\n    return [\n      { type:'reg-doc',    title:'Company registration',           desc:'Upload your certificate of incorporation.' },\n      { type:'addr-proof', title:'Business address proof',         desc:'Recent bill or bank statement in the company name.' },\n      { type:'director',   title:'Director identification',        desc:'Upload IDs for all directors on the register.' },\n      { type:'ubo',        title:'Ultimate beneficial owners',     desc:'List individuals owning 25% or more of the business.' },\n      { type:'liveness',   title:'Liveness check (representative)',desc:'The authorized representative completes a face scan.' },\n    ];\n  }\n  return [\n    { type:'doc-type',   title:'Select document type', desc:'Choose a valid government-issued photo ID.' },\n    { type:'doc-upload', title:'Upload your document', desc:'Take a clear photo of front and back.' },\n    { type:'liveness',   title:'Liveness check',       desc:'A quick 3D face scan to match your ID.' },\n    { type:'poa',        title:'Proof of address',     desc:'Utility bill or bank statement from the last 3 months.' },\n  ];\n}\n\nfunction renderVerifyStep() {\n  const flow = getVerifyFlow();\n  const total = flow.length;\n  const flowLabels = flow.map(s => s.title);\n  const cur = state.stepIdx;\n  const metaText = cur === 0\n    ? `Ready to start · ${total} steps`\n    : `Step ${cur} of ${total} · ${flowLabels[cur - 1]}`;\n  document.getElementById('verify-progress-text').textContent = metaText;\n  document.getElementById('verify-progress-track').innerHTML = flowLabels.map((_,i) => `<div class=\"step-bar-seg ${i < cur ? 'done' : ''}\"><\u002Fdiv>`).join('');\n\n  document.getElementById('step4-sub').textContent = state.flowType === 'kyb'\n    ? 'Company materials and representative liveness.'\n    : 'Document, face, and address if enabled.';\n\n  const content = document.getElementById('sumsub-content');\n  const btn = document.getElementById('verify-next-btn');\n  const backBtn = document.getElementById('verify-back-btn');\n  if (backBtn) backBtn.style.display = state.stepIdx === 0 ? 'none' : 'inline-flex';\n\n  if (state.stepIdx === 0) {\n    content.innerHTML = `\n      <div style=\"width:72px;height:72px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;margin:8px auto 14px\"><svg class=\"icn\" style=\"font-size:32px\"><use href=\"#i-shield-check\"/><\u002Fsvg><\u002Fdiv>\n      <div class=\"sumsub-step-title\">Ready to verify<\u002Fdiv>\n      <div class=\"sumsub-step-desc\">Data is processed by Sumsub and encrypted in transit.<\u002Fdiv>\n      <div style=\"text-align:left;background:var(--surface);border-radius:14px;padding:6px 14px\">\n        ${flow.map((s,i) => `\n          <div style=\"display:flex;align-items:center;gap:12px;padding:10px 0;${i===flow.length-1?'':'border-bottom:1px solid var(--border)'}\">\n            <div style=\"width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-size:11.5px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--accent)\">${i+1}<\u002Fdiv>\n            <div style=\"font-size:13.5px;font-weight:500;color:var(--text);letter-spacing:-0.01em\">${s.title}<\u002Fdiv>\n          <\u002Fdiv>\n        `).join('')}\n      <\u002Fdiv>\n    `;\n    btn.textContent = 'Start';\n    return;\n  }\n\n  const step = flow[state.stepIdx - 1];\n  content.innerHTML = renderVerifyContent(step);\n  btn.textContent = state.stepIdx === total ? 'Submit' : 'Continue';\n}\n\nfunction renderVerifyContent(step) {\n  const head = `<div class=\"sumsub-step-title\">${step.title}<\u002Fdiv><div class=\"sumsub-step-desc\">${step.desc}<\u002Fdiv>`;\n  const t = step.type;\n  if (t === 'doc-type') {\n    return head + `\n      <div class=\"doc-type-grid\">\n        <div class=\"doc-type selected\"><div class=\"doc-type-icon\"><svg class=\"icn\"><use href=\"#i-passport\"/><\u002Fsvg><\u002Fdiv><div class=\"doc-type-label\">Passport<\u002Fdiv><\u002Fdiv>\n        <div class=\"doc-type\"><div class=\"doc-type-icon\"><svg class=\"icn\"><use href=\"#i-card\"/><\u002Fsvg><\u002Fdiv><div class=\"doc-type-label\">ID card<\u002Fdiv><\u002Fdiv>\n        <div class=\"doc-type\"><div class=\"doc-type-icon\"><svg class=\"icn\"><use href=\"#i-license\"/><\u002Fsvg><\u002Fdiv><div class=\"doc-type-label\">Driver license<\u002Fdiv><\u002Fdiv>\n        <div class=\"doc-type\"><div class=\"doc-type-icon\"><svg class=\"icn\"><use href=\"#i-doc\"/><\u002Fsvg><\u002Fdiv><div class=\"doc-type-label\">Residence permit<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n  if (t === 'doc-upload' || t === 'poa' || t === 'reg-doc' || t === 'addr-proof') {\n    return head + `\n      <div class=\"sumsub-upload-zone\">\n        <svg class=\"icn\"><use href=\"#i-camera\"/><\u002Fsvg>\n        <div style=\"font-size:14.5px;font-weight:600;color:var(--text);margin-bottom:4px;letter-spacing:-0.01em\">Drop file or tap to upload<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--text2)\">JPG, PNG, or PDF · Max 10 MB<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"alert-box info\" style=\"text-align:left;margin-bottom:0\">\n        <div class=\"alert-text\"><strong style=\"color:#1D4FBA\">Tip.<\u002Fstrong> Good lighting, all corners visible, readable text.<\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n  if (t === 'liveness') {\n    return head + `\n      <div class=\"sumsub-camera-circle\"><svg class=\"icn\"><use href=\"#i-face-id\"/><\u002Fsvg><\u002Fdiv>\n      <div style=\"font-size:13px;color:var(--text);margin-bottom:8px;letter-spacing:-0.01em\">Position your face inside the circle<\u002Fdiv>\n      <div style=\"font-size:11.5px;color:var(--text2);line-height:1.55\">Good lighting · Remove glasses · Neutral expression<\u002Fdiv>\n    `;\n  }\n  if (t === 'ubo') {\n    return head + `\n      <div class=\"form-group\" style=\"text-align:left\"><div class=\"form-label\">Owner name <span class=\"req\">*<\u002Fspan><\u002Fdiv><input class=\"form-input\" value=\"Maria Schmidt\"><\u002Fdiv>\n      <div class=\"form-group\" style=\"text-align:left\"><div class=\"form-label\">Ownership % <span class=\"req\">*<\u002Fspan><\u002Fdiv><input class=\"form-input\" value=\"80%\"><\u002Fdiv>\n      <button class=\"btn-outline\" type=\"button\"><svg class=\"icn\" style=\"font-size:14px\"><use href=\"#i-plus\"/><\u002Fsvg> Add another beneficial owner<\u002Fbutton>\n    `;\n  }\n  if (t === 'director') {\n    return head + `\n      <div class=\"form-group\" style=\"text-align:left\"><div class=\"form-label\">Director name <span class=\"req\">*<\u002Fspan><\u002Fdiv><input class=\"form-input\" value=\"Maria Schmidt\"><\u002Fdiv>\n      <div class=\"sumsub-upload-zone\" style=\"margin-top:12px;margin-bottom:0\">\n        <svg class=\"icn\"><use href=\"#i-card\"/><\u002Fsvg>\n        <div style=\"font-size:14px;font-weight:600;color:var(--text);letter-spacing:-0.01em\">Upload director ID<\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }\n  return head;\n}\n\nfunction nextVerifyStep() {\n  const flow = getVerifyFlow();\n  if (state.stepIdx < flow.length) { state.stepIdx++; renderVerifyStep(); return; }\n  showResult('pending');\n}\n\nfunction prevVerifyStep() {\n  if (state.stepIdx > 0) { state.stepIdx--; renderVerifyStep(); }\n}\n\n/* ═══════════ RESULT ═══════════ */\nfunction showResult(kind) {\n  const el = document.getElementById('result-content');\n  if (kind === 'success-verified') {\n    state.level = 'verified';\n    el.innerHTML = `\n      <div style=\"display:flex;justify-content:center;margin-bottom:14px\"><img src=\"assets/done.png\" alt=\"\" style=\"width:96px;height:96px;display:block\"><\u002Fdiv>\n      <div class=\"completion-title\">You're verified<\u002Fdiv>\n      <div class=\"completion-sub\">Identity verification complete. Fiat withdrawal and higher limits are now available.<\u002Fdiv>\n      <div style=\"height:14px\"><\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"goScreen('status')\">See what's unlocked<\u002Fbutton>\n      <div style=\"height:8px\"><\u002Fdiv>\n      <button class=\"btn-outline\" onclick=\"goScreen('entry')\">Back to home<\u002Fbutton>\n    `;\n  } else if (kind === 'success-kyb') {\n    state.level = 'kyb';\n    el.innerHTML = `\n      <div class=\"completion-icon business\"><svg class=\"icn\"><use href=\"#i-building\"/><\u002Fsvg><\u002Fdiv>\n      <div class=\"completion-title\">Business verified<\u002Fdiv>\n      <div class=\"completion-sub\">Your business is verified. All business features are now unlocked.<\u002Fdiv>\n      <div style=\"height:14px\"><\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-bottom:18px\"><span class=\"lvl-badge business\"><span class=\"dot\"><\u002Fspan>Business Verified<\u002Fspan><\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"goScreen('status')\">See what's unlocked<\u002Fbutton>\n      <div style=\"height:8px\"><\u002Fdiv>\n      <button class=\"btn-outline\" onclick=\"goScreen('entry')\">Back to home<\u002Fbutton>\n    `;\n  } else if (kind === 'retry') {\n    el.innerHTML = `\n      <div class=\"completion-icon failed\"><svg class=\"icn\"><use href=\"#i-warn\"/><\u002Fsvg><\u002Fdiv>\n      <div class=\"completion-title\" style=\"color:var(--red)\">Verification unsuccessful<\u002Fdiv>\n      <div class=\"completion-sub\">We couldn't verify your identity.<\u002Fdiv>\n      <div style=\"height:18px\"><\u002Fdiv>\n      <div class=\"alert-box warn\" style=\"text-align:left\">\n        <div class=\"alert-text\"><strong>Reason.<\u002Fstrong> Document photo is unclear. Retake with better lighting, all corners visible.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--text2);margin-bottom:14px\">Attempts remaining at this level: <strong style=\"color:var(--text)\">2 of 3<\u002Fstrong><\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"retryVerification()\">Retry verification<\u002Fbutton>\n      <div style=\"height:8px\"><\u002Fdiv>\n      <button class=\"btn-outline\" onclick=\"goScreen('entry')\">Back to home<\u002Fbutton>\n    `;\n  } else if (kind === 'final') {\n    state.level = 'final-rejected';\n    el.innerHTML = `\n      <div class=\"completion-icon failed\"><svg class=\"icn\"><use href=\"#i-block\"/><\u002Fsvg><\u002Fdiv>\n      <div class=\"completion-title\" style=\"color:var(--red)\">Verification denied<\u002Fdiv>\n      <div class=\"completion-sub\">We're unable to verify your identity at this time.<\u002Fdiv>\n      <div style=\"height:18px\"><\u002Fdiv>\n      <div class=\"alert-box warn\" style=\"text-align:left\">\n        <div class=\"alert-text\">If you believe this is an error, please contact support for assistance.<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"goScreen('entry')\">Contact support<\u002Fbutton>\n    `;\n  } else if (kind === 'pending') {\n    const isKyb = state.flowType === 'kyb';\n    el.innerHTML = `\n      <div style=\"display:flex;justify-content:center;margin-bottom:14px\"><img src=\"assets/under-review.png\" alt=\"\" style=\"height:200px;width:auto;display:block\"><\u002Fdiv>\n      <div class=\"completion-title\" style=\"color:var(--orange)\"><span style=\"color:rgb(0, 0, 0)\">Under review<\u002Fspan><\u002Fdiv>\n      <div class=\"completion-sub\">Your ${isKyb ? 'KYB' : 'verification'} submission is being reviewed. This usually takes ${isKyb ? '1–3 business days' : 'a few minutes to a few hours'}.<\u002Fdiv>\n      <div style=\"height:18px\"><\u002Fdiv>\n      <div class=\"alert-box info\" style=\"text-align:left\">\n        <div class=\"alert-text\">We'll email you once the review is complete. You don't need to resubmit.<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"btn-outline\" onclick=\"goScreen('entry')\">Back to home<\u002Fbutton>\n    `;\n  }\n  goScreen('result');\n}\n\n/* ═══════════ STATUS ═══════════ */\nfunction renderStatus() {\n  const el = document.getElementById('status-overview');\n  const lvl = state.level;\n  if (lvl === 'unverified') {\n    el.innerHTML = `\n      <div class=\"status-card\">\n        <img src=\"assets/avatar-A.png\" alt=\"\" style=\"width:44px;height:44px;border-radius:50%;flex-shrink:0;object-fit:cover\">\n        <div class=\"status-card-info\">\n          <div class=\"status-card-label\">Current level<\u002Fdiv>\n          <div class=\"status-card-value\">Alex Wong<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"lvl-badge unverified\"><span class=\"dot\"><\u002Fspan>Unverified<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"alert-box info\"><div class=\"alert-text\">Complete verification to unlock fiat withdrawals, higher limits, and business features.<\u002Fdiv><\u002Fdiv>\n      <button class=\"btn-primary\" onclick=\"startFlow()\">Start verification<\u002Fbutton>\n    `;\n  } else {\n    const manualNote = lvl === 'kyb-manual' ? `<span class=\"lvl-badge manual-admin\" style=\"margin-left:6px\" title=\"Admin-only indicator\"><svg class=\"icn\" style=\"font-size:11px\"><use href=\"#i-key\"/><\u002Fsvg> Manually verified<\u002Fspan>` : '';\n    el.innerHTML = `\n      <div class=\"status-card\">\n        <img src=\"assets/avatar-A.png\" alt=\"\" style=\"width:44px;height:44px;border-radius:50%;flex-shrink:0;object-fit:cover\">\n        <div class=\"status-card-info\">\n          <div class=\"status-card-label\">Current level<\u002Fdiv>\n          <div class=\"status-card-value\">Alex Wong<\u002Fdiv>\n        <\u002Fdiv>\n        <span class=\"lvl-badge ${LEVEL_BADGE_CLASS[lvl]}\"><span class=\"dot\"><\u002Fspan>${LEVEL_LABEL[lvl]}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"info-list\">\n        <div class=\"info-list-row\"><span class=\"info-list-label\">Verified on<\u002Fspan><span class=\"info-list-value\">Apr 20, 2026<\u002Fspan><\u002Fdiv>\n        <div class=\"info-list-row\"><span class=\"info-list-label\">Source<\u002Fspan><span class=\"info-list-value\">${lvl === 'kyb-manual' ? 'Admin (manual)' : 'Sumsub'}${manualNote}<\u002Fspan><\u002Fdiv>\n        <div class=\"info-list-row\"><span class=\"info-list-label\">Country<\u002Fspan><span class=\"info-list-value\">Germany<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      ${lvl === 'verified' ? `\n        <div class=\"alert-box info\">\n          <div class=\"alert-text\">Running a business? Verify as a business to unlock Payroll and higher limits.<\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"btn-outline\" onclick=\"state.flowType='kyb';startFlow()\">Verify as business<\u002Fbutton>\n      ` : ''}\n    `;\n  }\n  renderMatrix(document.getElementById('status-matrix'), lvl === 'unverified' ? null : lvl);\n}\n\n/* ═══════════ BLOCKED DEMO ═══════════ */\nconst BLOCKED_CASES = {\n  offramp: { title:'Withdraw to bank',  required:'verified', requiredLabel:'Verified',          missing:'ID + liveness + address proof',     featureName:'fiat withdrawal' },\n  payroll: { title:'Send payroll',       required:'kyb',      requiredLabel:'Business Verified', missing:'Business registration & UBO',       featureName:'Payroll' },\n  onramp:  { title:'Top up with card',   required:'verified', requiredLabel:'Verified',          missing:'ID + liveness + address proof',     featureName:'fiat top-up' },\n};\n\nfunction showBlocked(kind) {\n  const c = BLOCKED_CASES[kind];\n  const currentLabel = LEVEL_LABEL[state.level];\n  const currentCls = LEVEL_BADGE_CLASS[state.level];\n  const reqCls = LEVEL_BADGE_CLASS[c.required];\n\n  document.getElementById('blocked-sheet-title').textContent = 'KYC Required';\n  document.getElementById('blocked-sheet-body').innerHTML = `\n    <div class=\"blocked-modal\">\n      <div class=\"blocked-illustration\"><img src=\"assets/KYC.png\" alt=\"\"><\u002Fdiv>\n      <div style=\"text-align:center;padding:6px 0 14px\">\n        <div style=\"font-size:17px;font-weight:500;color:var(--text);margin-bottom:6px;letter-spacing:-0.02em\">${c.title} is locked<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--text2);line-height:1.5\">Complete verification to use ${c.featureName}.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"blocked-delta\">\n        <strong>Documents required<\u002Fstrong>\n        ${c.missing}\n      <\u002Fdiv>\n\n      <div class=\"blocked-actions\">\n        <button class=\"btn-primary\" onclick=\"closeSheet('blocked-sheet');state.flowType='${c.required === 'kyb' ? 'kyb' : 'kyc'}';startFlow()\">Start now<\u002Fbutton>\n        <div style=\"height:8px\"><\u002Fdiv>\n        <button class=\"btn-outline\" style=\"background:#F2F8F5;border:none\" onclick=\"closeSheet('blocked-sheet')\">Not now<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `;\n  openSheet('blocked-sheet');\n}\n\nfunction openSheet(id) {\n  document.getElementById(id + '-overlay').classList.add('open');\n  document.getElementById(id).classList.add('open');\n}\nfunction closeSheet(id) {\n  document.getElementById(id + '-overlay').classList.remove('open');\n  document.getElementById(id).classList.remove('open');\n}\n\n/* ═══════════ ADMIN ═══════════ */\nfunction adminMarkKyb() {\n  state.level = 'kyb-manual';\n  toast('Merchant marked as Business Verified (manual)');\n  goScreen('status');\n}\n\n/* ═══════════ TOAST ═══════════ */\nfunction toast(msg) {\n  const c = document.getElementById('toast-container');\n  const t = document.createElement('div');\n  t.className = 'toast';\n  t.innerHTML = '<svg class=\"icn\"><use href=\"#i-check\"/><\u002Fsvg>' + msg;\n  c.appendChild(t);\n  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .25s'; }, 2200);\n  setTimeout(() => { t.remove(); }, 2500);\n}\n\n/* ═══════════ CUSTOM DROPDOWN ═══════════ */\nfunction renderDropdowns() {\n  document.querySelectorAll('[data-dd]').forEach(dd => {\n    if (dd.dataset.ddInit) return;\n    dd.dataset.ddInit = '1';\n    const opts = JSON.parse(dd.dataset.options || '[]');\n    const initial = dd.dataset.value || opts[0] || '';\n    dd.innerHTML = `\n      <button type=\"button\" class=\"dd-trigger\" aria-expanded=\"false\">\n        <span class=\"dd-value\">${initial}<\u002Fspan>\n        <svg class=\"dd-chev\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"4 6 8 2 12 6\"/><polyline points=\"4 10 8 14 12 10\"/><\u002Fsvg>\n      <\u002Fbutton>\n      <div class=\"dd-panel\" role=\"listbox\">\n        ${opts.map(o => `<div class=\"dd-option${o===initial?' selected':''}\" role=\"option\" data-val=\"${o.replace(/\"/g,'&quot;')}\">${o}<\u002Fdiv>`).join('')}\n      <\u002Fdiv>\n    `;\n    const trigger = dd.querySelector('.dd-trigger');\n    const panel = dd.querySelector('.dd-panel');\n    const valEl = dd.querySelector('.dd-value');\n    trigger.addEventListener('click', e => {\n      e.stopPropagation();\n      const wasOpen = panel.classList.contains('open');\n      document.querySelectorAll('.dd-panel.open').forEach(p => p.classList.remove('open'));\n      if (!wasOpen) panel.classList.add('open');\n    });\n    panel.addEventListener('click', e => {\n      const opt = e.target.closest('.dd-option');\n      if (!opt) return;\n      const v = opt.dataset.val;\n      valEl.textContent = v;\n      dd.dataset.value = v;\n      panel.querySelectorAll('.dd-option').forEach(o => o.classList.toggle('selected', o === opt));\n      panel.classList.remove('open');\n    });\n  });\n}\ndocument.addEventListener('click', () => {\n  document.querySelectorAll('.dd-panel.open').forEach(p => p.classList.remove('open'));\n});\nrenderDropdowns();\n\n/* ═══════════ INIT ═══════════ */\nrenderEntry();\n<\u002Fscript>\n\n<!-- ═══════════ ICON LIBRARY WIDGET ═══════════ -->\n<style>\n.iconlib-fab{position:fixed;right:20px;bottom:20px;z-index:9000;height:44px;padding:0 16px 0 14px;border-radius:22px;background:#0f172a;color:#fff;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;letter-spacing:-0.01em;box-shadow:0 8px 24px rgba(0,0,0,.18),0 2px 6px rgba(0,0,0,.12);transition:transform .2s,background .2s;font-family:inherit}\n.iconlib-fab:hover{transform:translateY(-1px);background:#1e293b}\n.iconlib-fab svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}\n.iconlib-panel{position:fixed;right:20px;bottom:80px;z-index:9001;width:380px;max-width:calc(100vw - 40px);max-height:70vh;background:#fff;border-radius:16px;box-shadow:0 24px 60px -12px rgba(0,0,0,.25),0 4px 12px rgba(0,0,0,.08);display:none;flex-direction:column;overflow:hidden;border:1px solid #e2e8f0}\n.iconlib-panel.open{display:flex;animation:iconlibIn .2s ease-out}\n@keyframes iconlibIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n.iconlib-head{padding:14px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}\n.iconlib-title{font-size:14px;font-weight:600;color:#0f172a;letter-spacing:-0.01em}\n.iconlib-count{font-size:11px;color:#94a3b8;font-family:var(--font-mono,ui-monospace,monospace);margin-left:6px}\n.iconlib-actions{display:flex;gap:6px}\n.iconlib-btn{padding:6px 11px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#0f172a;font-size:12px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .15s}\n.iconlib-btn:hover{background:#f1f5f9}\n.iconlib-btn.primary{background:#0f172a;color:#fff;border-color:#0f172a}\n.iconlib-btn.primary:hover{background:#1e293b}\n.iconlib-tabs{display:flex;gap:2px;padding:8px 16px 0;flex-shrink:0;border-bottom:1px solid #f1f5f9}\n.iconlib-tab{padding:8px 12px;font-size:12px;font-weight:500;color:#64748b;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}\n.iconlib-tab.active{color:#0f172a;border-bottom-color:#0f172a}\n.iconlib-tab:hover{color:#0f172a}\n.iconlib-body{padding:12px;overflow-y:auto;flex:1}\n.iconlib-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}\n.iconlib-cell{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px 10px;border:1px solid #f1f5f9;border-radius:10px;background:#fafbfc;cursor:pointer;transition:background .15s,border-color .15s;position:relative}\n.iconlib-cell:hover{background:#f1f5f9;border-color:#e2e8f0}\n.iconlib-cell:hover .iconlib-dl{opacity:1}\n.iconlib-thumb{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#0f172a}\n.iconlib-thumb svg{width:24px;height:24px}\n.iconlib-thumb img{max-width:100%;max-height:100%;object-fit:contain}\n.iconlib-name{font-size:10px;color:#64748b;font-family:var(--font-mono,ui-monospace,monospace);text-align:center;word-break:break-all;line-height:1.3;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.iconlib-dl{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:6px;background:#0f172a;color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}\n.iconlib-dl:hover{background:#1e293b}\n.iconlib-dl svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}\n.iconlib-empty{padding:32px 16px;text-align:center;color:#94a3b8;font-size:13px}\n.iconlib-toast{position:fixed;right:20px;bottom:80px;z-index:9100;background:#0f172a;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.18);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(8px)}\n.iconlib-toast.show{opacity:1;transform:translateY(0)}\n<\u002Fstyle>\n\n<button class=\"iconlib-fab\" id=\"iconlibFab\" aria-label=\"Open icon library\" title=\"Icon library\">\n  <svg viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.5\"><\u002Frect><\u002Fsvg>\n  <span>Download images<\u002Fspan>\n<\u002Fbutton>\n\n<div class=\"iconlib-panel\" id=\"iconlibPanel\" role=\"dialog\" aria-label=\"Icon library\">\n  <div class=\"iconlib-head\">\n    <div>\n      <span class=\"iconlib-title\">Icon library<\u002Fspan>\n      <span class=\"iconlib-count\" id=\"iconlibCount\"><\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"iconlib-actions\">\n      <button class=\"iconlib-btn primary\" id=\"iconlibDlAll\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"><\u002Fpath><polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fline><\u002Fsvg>\n        Download all\n      <\u002Fbutton>\n      <button class=\"iconlib-btn\" id=\"iconlibClose\" aria-label=\"Close\">✕<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"iconlib-tabs\">\n    <button class=\"iconlib-tab active\" data-tab=\"all\">All<\u002Fbutton>\n    <button class=\"iconlib-tab\" data-tab=\"svg\">SVG<\u002Fbutton>\n    <button class=\"iconlib-tab\" data-tab=\"png\">PNG<\u002Fbutton>\n  <\u002Fdiv>\n  <div class=\"iconlib-body\">\n    <div class=\"iconlib-grid\" id=\"iconlibGrid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"iconlib-toast\" id=\"iconlibToast\"><\u002Fdiv>\n\n<script>\n(function(){\n  // ─── Asset files (in /assets folder) ───\n  const ASSET_FILES = [\n    { name: 'allscale-logo.svg', type: 'svg' },\n    { name: 'back.svg', type: 'svg' },\n    { name: 'check.svg', type: 'svg' },\n    { name: 'done.svg', type: 'svg' },\n    { name: 'failed.svg', type: 'svg' },\n    { name: 'processing.svg', type: 'svg' },\n    { name: 'right-arrow.svg', type: 'svg' },\n    { name: 'KYC.png', type: 'png' },\n    { name: 'avatar.png', type: 'png' },\n    { name: 'avatar-A.png', type: 'png' },\n    { name: 'done.png', type: 'png' },\n    { name: 'under-review.png', type: 'png' },\n  ];\n\n  // ─── Build inline-symbol library ───\n  function symbolToSvgString(sym) {\n    const vb = sym.getAttribute('viewBox') || '0 0 24 24';\n    const inner = sym.innerHTML;\n    // Inherit drawing attributes from the symbol so the standalone SVG matches what's used in-app.\n    const attrs = ['fill','stroke','stroke-width','stroke-linecap','stroke-linejoin'];\n    const attrStr = attrs\n      .map(a => sym.getAttribute(a) ? `${a}=\"${sym.getAttribute(a)}\"` : '')\n      .filter(Boolean)\n      .join(' ');\n    return `<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"${vb}\" width=\"24\" height=\"24\" ${attrStr}>${inner}<\u002Fsvg>`;\n  }\n\n  function collectInlineIcons() {\n    const list = [];\n    document.querySelectorAll('symbol[id^=\"i-\"]').forEach(sym => {\n      list.push({\n        id: sym.id,\n        name: sym.id.replace(/^i-/,'') + '.svg',\n        type: 'inline-svg',\n        svgStr: symbolToSvgString(sym),\n      });\n    });\n    return list;\n  }\n\n  // ─── Toast ───\n  const toastEl = document.getElementById('iconlibToast');\n  let toastTimer;\n  function showToast(msg) {\n    toastEl.textContent = msg;\n    toastEl.classList.add('show');\n    clearTimeout(toastTimer);\n    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);\n  }\n\n  // ─── Download helpers ───\n  function triggerDownload(blobOrUrl, filename) {\n    const url = (typeof blobOrUrl === 'string') ? blobOrUrl : URL.createObjectURL(blobOrUrl);\n    const a = document.createElement('a');\n    a.href = url;\n    a.download = filename;\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    if (typeof blobOrUrl !== 'string') {\n      setTimeout(() => URL.revokeObjectURL(url), 1000);\n    }\n  }\n\n  async function fetchAssetBlob(filename) {\n    const res = await fetch('assets/' + filename);\n    if (!res.ok) throw new Error('Could not fetch ' + filename);\n    return await res.blob();\n  }\n\n  // ─── Render grid ───\n  const grid = document.getElementById('iconlibGrid');\n  const countEl = document.getElementById('iconlibCount');\n  let currentTab = 'all';\n  const inlineIcons = collectInlineIcons();\n  const allItems = [\n    ...inlineIcons.map(i => ({ ...i, kind: 'inline' })),\n    ...ASSET_FILES.map(f => ({ ...f, name: f.name, kind: 'asset' })),\n  ];\n\n  function filterItems() {\n    if (currentTab === 'all') return allItems;\n    if (currentTab === 'svg') return allItems.filter(i => i.type === 'svg' || i.type === 'inline-svg');\n    if (currentTab === 'png') return allItems.filter(i => i.type === 'png');\n    return allItems;\n  }\n\n  function render() {\n    const items = filterItems();\n    countEl.textContent = `· ${items.length} icons`;\n    grid.innerHTML = '';\n    if (items.length === 0) {\n      grid.innerHTML = '<div class=\"iconlib-empty\" style=\"grid-column:1/-1\">No icons<\u002Fdiv>';\n      return;\n    }\n    items.forEach(it => {\n      const cell = document.createElement('div');\n      cell.className = 'iconlib-cell';\n      cell.title = it.name;\n      const thumb = document.createElement('div');\n      thumb.className = 'iconlib-thumb';\n      if (it.kind === 'inline') {\n        thumb.innerHTML = `<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><use href=\"#${it.id}\"/><\u002Fsvg>`;\n      } else {\n        const img = document.createElement('img');\n        img.src = 'assets/' + it.name;\n        img.alt = it.name;\n        thumb.appendChild(img);\n      }\n      const name = document.createElement('div');\n      name.className = 'iconlib-name';\n      name.textContent = it.name;\n      const dl = document.createElement('button');\n      dl.className = 'iconlib-dl';\n      dl.title = 'Download ' + it.name;\n      dl.innerHTML = '<svg viewBox=\"0 0 24 24\"><path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"/><polyline points=\"7 10 12 15 17 10\"/><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"/><\u002Fsvg>';\n      dl.addEventListener('click', async (e) => {\n        e.stopPropagation();\n        try {\n          if (it.kind === 'inline') {\n            const blob = new Blob([it.svgStr], { type: 'image/svg+xml' });\n            triggerDownload(blob, it.name);\n          } else {\n            const blob = await fetchAssetBlob(it.name);\n            triggerDownload(blob, it.name);\n          }\n          showToast('Downloaded ' + it.name);\n        } catch(err) {\n          showToast('Failed: ' + it.name);\n        }\n      });\n      cell.addEventListener('click', () => dl.click());\n      cell.appendChild(dl);\n      cell.appendChild(thumb);\n      cell.appendChild(name);\n      grid.appendChild(cell);\n    });\n  }\n\n  // ─── Tabs ───\n  document.querySelectorAll('.iconlib-tab').forEach(tab => {\n    tab.addEventListener('click', () => {\n      document.querySelectorAll('.iconlib-tab').forEach(t => t.classList.remove('active'));\n      tab.classList.add('active');\n      currentTab = tab.dataset.tab;\n      render();\n    });\n  });\n\n  // ─── FAB / panel toggle ───\n  const fab = document.getElementById('iconlibFab');\n  const panel = document.getElementById('iconlibPanel');\n  fab.addEventListener('click', () => {\n    panel.classList.toggle('open');\n    if (panel.classList.contains('open')) render();\n  });\n  document.getElementById('iconlibClose').addEventListener('click', () => {\n    panel.classList.remove('open');\n  });\n\n  // ─── Download all (ZIP) ───\n  function loadJSZip() {\n    return new Promise((resolve, reject) => {\n      if (window.JSZip) return resolve(window.JSZip);\n      const s = document.createElement('script');\n      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';\n      s.onload = () => resolve(window.JSZip);\n      s.onerror = reject;\n      document.head.appendChild(s);\n    });\n  }\n\n  document.getElementById('iconlibDlAll').addEventListener('click', async () => {\n    const btn = document.getElementById('iconlibDlAll');\n    const originalText = btn.innerHTML;\n    btn.disabled = true;\n    btn.innerHTML = 'Packing…';\n    try {\n      const JSZip = await loadJSZip();\n      const zip = new JSZip();\n      const svgFolder = zip.folder('svg');\n      const pngFolder = zip.folder('png');\n      const inlineFolder = zip.folder('inline-svg');\n\n      // Inline symbols\n      inlineIcons.forEach(it => {\n        inlineFolder.file(it.name, it.svgStr);\n      });\n\n      // Asset files\n      const fetches = ASSET_FILES.map(async (f) => {\n        try {\n          const blob = await fetchAssetBlob(f.name);\n          if (f.type === 'svg') svgFolder.file(f.name, blob);\n          else pngFolder.file(f.name, blob);\n        } catch(e) { /* skip missing */ }\n      });\n      await Promise.all(fetches);\n\n      const out = await zip.generateAsync({ type: 'blob' });\n      triggerDownload(out, 'KYC-icons.zip');\n      showToast('Downloaded KYC-icons.zip');\n    } catch(err) {\n      console.error(err);\n      showToast('Pack failed');\n    } finally {\n      btn.disabled = false;\n      btn.innerHTML = originalText;\n    }\n  });\n\n  // Initial render so count is accurate even before opening\n  render();\n})();\n<\u002Fscript>\n\n\n\n\n<style id=\"__om-edit-overrides\">\n#f-country >[role=\"listbox\"] { height: 230px !important }\n#entry-alert >.alert-title { color: rgb(245, 158, 11) !important }\n#entry-alert >.alert-text { color: rgb(178, 102, 0) !important }\n#entry-alert >.alert-title { color: rgb(178, 102, 0) !important }\n#result-content >.btn-outline { border-style: none !important }\n\n#entry-alert >.alert-text { color: rgb(0, 0, 0) !important }\n#result-content >.completion-title { color: rgb(0, 0, 0) !important }\n#result-content .alert-text { color: rgb(0, 152, 89) !important }\n#result-content >.alert-box { background-color: rgb(0, 152, 89) !important }\n#result-content >.alert-box { background-color: rgba(0, 152, 89, 0.03) !important }\n#result-content >.alert-box { background-color: rgba(0, 152, 89, 0.106) !important }\n#result-content >.alert-box { border-style: none !important }\n#result-content >.alert-box { border-style: none !important }\n#blocked-sheet :is(h1,h2,h3,h4,h5,h6,p,li,dt,dd,blockquote,figcaption,label,span,a,em,strong,small,td,th,caption) >span:last-child { font-size: 24px !important }\n#blocked-sheet-body .btn-outline { background-color: rgb(242, 248, 245) !important }\n#blocked-sheet-body .btn-outline { background-color: rgb(242, 248, 245) !important }\n#blocked-sheet-body .btn-outline { border-style: none !important }\n#status-overview >:is(button,input,textarea) { background-color: rgb(0, 152, 89) !important }\n#status-overview >:is(button,input,textarea) { color: rgb(253, 255, 254) !important }\n#status-overview >:is(button,input,textarea) { border-style: none !important }\n#status-overview >:is(button,input,textarea) { color: rgb(253, 255, 254) !important }\n#status-overview >:is(button,input,textarea) { background-color: rgb(0, 152, 89) !important }\n#status-overview >:is(button,input,textarea) { border-style: none !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
