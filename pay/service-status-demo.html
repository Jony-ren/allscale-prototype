document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n<div id=\"toast-container\"><\u002Fdiv>\n\n<script>\n  // ============ Config ============\n  const STORAGE_KEY = \"allscale-status-hifi-v1\";\n\n  const CHAINS = [\n    { id:\"ethereum\", name:\"Ethereum\", color:\"#627EEA\", normalRef:\"~3 min\", dgThresh:\">10 min\", otThresh:\">30 min\", normal:\"2.6 min\", dg:\"14 min\", ot:\"42 min\" },\n    { id:\"arbitrum\", name:\"Arbitrum\", color:\"#28A0F0\", normalRef:\"<1 min\", dgThresh:\">5 min\",  otThresh:\">15 min\", normal:\"28 s\",   dg:\"7 min\",  ot:\"22 min\" },\n    { id:\"base\",     name:\"Base\",     color:\"#0052FF\", normalRef:\"<1 min\", dgThresh:\">5 min\",  otThresh:\">15 min\", normal:\"24 s\",   dg:\"6 min\",  ot:\"19 min\" },\n    { id:\"polygon\",  name:\"Polygon\",  color:\"#8247E5\", normalRef:\"~1 min\", dgThresh:\">5 min\",  otThresh:\">15 min\", normal:\"50 s\",   dg:\"8 min\",  ot:\"25 min\" },\n    { id:\"optimism\", name:\"Optimism\", color:\"#FF0420\", normalRef:\"<1 min\", dgThresh:\">5 min\",  otThresh:\">15 min\", normal:\"26 s\",   dg:\"7 min\",  ot:\"21 min\" },\n    { id:\"bsc\",      name:\"BSC\",      color:\"#F0B90B\", normalRef:\"~1 min\", dgThresh:\">5 min\",  otThresh:\">15 min\", normal:\"45 s\",   dg:\"9 min\",  ot:\"28 min\" }\n  ];\n  const SWIDGE = { id:\"swidge\", name:\"Swidge\", color:\"#7C3AED\", desc:\"Cross-chain swap routing for Checkout\" };\n  const COMPONENTS = [...CHAINS.map(c=>({...c,kind:\"chain\"})), {...SWIDGE, kind:\"swidge\"}];\n\n  // ============ Real chain logos (inline SVG token chips) ============\n  const CHAIN_LOGO = {\n    ethereum:`<svg viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"16\" fill=\"#627EEA\"/><g fill=\"#fff\"><path fill-opacity=\".602\" d=\"M16.5 4v8.87l7.5 3.35z\"/><path d=\"M16.5 4 9 16.22l7.5-3.35z\"/><path fill-opacity=\".602\" d=\"M16.5 21.97V28L24 17.62z\"/><path d=\"M16.5 28v-6.03L9 17.62z\"/><path fill-opacity=\".2\" d=\"m16.5 20.57 7.5-4.35-7.5-3.35z\"/><path fill-opacity=\".602\" d=\"M9 16.22l7.5 4.35v-7.7z\"/><\u002Fg><\u002Fsvg>`,\n    arbitrum:`<svg viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"16\" fill=\"#2D374B\"/><g fill=\"none\" stroke-linecap=\"round\"><path d=\"M16 9.8 11 22\" stroke=\"#fff\" stroke-width=\"2.4\"/><path d=\"M16 9.8 21 22\" stroke=\"#28A0F0\" stroke-width=\"2.4\"/><path d=\"M13.2 18.4h5.6\" stroke=\"#fff\" stroke-width=\"2\"/><\u002Fg><\u002Fsvg>`,\n    base:`<svg viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"16\" fill=\"#0052FF\"/><path fill=\"#fff\" d=\"M21 8.52A9 9 0 1 0 21 23.48Z\"/><\u002Fsvg>`,\n    polygon:`<svg viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"16\" fill=\"#8247E5\"/><path fill=\"#fff\" d=\"M21.09 12.69c-.37-.21-.85-.21-1.25 0l-2.88 1.74-1.96 1.1-2.88 1.74c-.37.21-.85.21-1.25 0l-2.29-1.36c-.37-.21-.63-.62-.63-1.07v-2.64c0-.43.22-.84.63-1.07l2.25-1.32c.37-.21.85-.21 1.25 0l2.25 1.32c.37.21.63.62.63 1.07v1.74l1.96-1.14v-1.74c0-.43-.22-.84-.63-1.07l-4.17-2.46c-.37-.21-.85-.21-1.25 0l-4.24 2.46c-.41.23-.63.64-.63 1.07v4.89c0 .43.22.84.63 1.07l4.24 2.46c.37.21.85.21 1.25 0l2.88-1.7 1.96-1.14 2.88-1.7c.37-.21.85-.21 1.25 0l2.25 1.32c.37.21.63.62.63 1.07v2.64c0 .43-.22.84-.63 1.07l-2.25 1.36c-.37.21-.85.21-1.25 0l-2.25-1.32c-.37-.21-.63-.62-.63-1.07v-1.74l-1.96 1.14v1.74c0 .43.22.84.63 1.07l4.24 2.46c.37.21.85.21 1.25 0l4.24-2.46c.37-.21.63-.62.63-1.07v-4.89c0-.43-.22-.84-.63-1.07l-4.28-2.5z\"/><\u002Fsvg>`,\n    optimism:`<svg viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"16\" fill=\"#FF0420\"/><text x=\"16\" y=\"20.4\" text-anchor=\"middle\" font-family=\"Archivo,sans-serif\" font-weight=\"700\" font-size=\"10.5\" letter-spacing=\"-0.5\" fill=\"#fff\">OP<\u002Ftext><\u002Fsvg>`,\n    bsc:`<svg viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"16\" fill=\"#F0B90B\"/><path fill=\"#fff\" d=\"M12.12 14.4 16 10.52l3.89 3.89 2.26-2.26L16 6l-6.14 6.14 2.26 2.26zM6 16l2.26-2.26L10.52 16l-2.26 2.26zm6.12 1.6L16 21.48l3.89-3.89 2.26 2.26L16 26l-6.14-6.14 2.26-2.26zM21.48 16l2.26-2.26L26 16l-2.26 2.26zM18.29 16 16 18.29 13.71 16 16 13.71l.4.4.99.99z\"/><\u002Fsvg>`,\n    swidge:`<svg viewBox=\"0 0 32 32\"><circle cx=\"16\" cy=\"16\" r=\"16\" fill=\"#7C3AED\"/><g fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M10.5 13H20l-2.6-2.6M21.5 19H12l2.6 2.6\"/><\u002Fg><\u002Fsvg>`\n  };\n  const compLogo = c => CHAIN_LOGO[c.id] || `<div style=\"width:100%;height:100%;border-radius:50%;background:${c.color};display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:12px;\">${c.name[0]}<\u002Fdiv>`;\n\n  const CATALOG = {\n    chain_delay:        { label:\"确认延迟超阈值\",   incidentLabel:\"Delayed confirmations\",     severity:\"degraded\", tpl:\"{Chain} transactions may be delayed — we're monitoring\" },\n    chain_severe_delay: { label:\"确认延迟严重超阈值\", incidentLabel:\"Major confirmation delays\", severity:\"outage\",   tpl:\"{Chain} transactions are significantly delayed — we're working on it\" },\n    swidge_down:        { label:\"Swidge 不可用\",    incidentLabel:\"Temporarily unavailable\",   severity:\"outage\",   targetId:\"swidge\", tpl:\"Cross-chain transfers are temporarily unavailable — we're working on a fix\" }\n  };\n  const SEVERITY_RANK = { operational:0, degraded:1, outage:2 };\n\n  // ============ State ============\n  const defaultState = {\n    incidents: [],\n    latencyLevel: Object.fromEntries(CHAINS.map(c=>[c.id,\"ok\"])),\n    swidgeUp: true,\n    updatedAt: Date.now()\n  };\n  const loadState = () => {\n    try { const raw = sessionStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : structuredClone(defaultState); }\n    catch { return structuredClone(defaultState); }\n  };\n  const saveState = (s) => { s.updatedAt = Date.now(); sessionStorage.setItem(STORAGE_KEY, JSON.stringify(s)); };\n  let state = loadState();\n\n  // ============ 90 天历史 ============\n  function seededRand(seed){ let x = seed; return () => { x = (x * 1103515245 + 12345) % 2147483648; return x / 2147483648; }; }\n  const LAUNCH_DAYS_AGO = 62;\n  function buildHistory(comp, idx){\n    const rnd = seededRand(idx * 7919 + 13);\n    const twoState = comp.kind === \"swidge\";\n    const days = [];\n    for (let d = 89; d >= 1; d--) {\n      if (d > LAUNCH_DAYS_AGO) { days.push(\"nd\"); continue; }\n      const r = rnd();\n      if (r > 0.985) days.push(\"ot\");\n      else if (!twoState && r > 0.94) days.push(\"dg\");\n      else days.push(\"ok\");\n    }\n    return days;\n  }\n  const HISTORY = Object.fromEntries(COMPONENTS.map((c,i)=>[c.id, buildHistory(c,i)]));\n\n  // ============ 推导 ============\n  const chainById = id => CHAINS.find(c => c.id === id);\n  const compById  = id => COMPONENTS.find(c => c.id === id);\n  const activeIncidents = () => state.incidents.filter(i => i.status !== \"resolved\");\n\n  function compStatus(id){\n    let worst = \"operational\";\n    activeIncidents().forEach(i => {\n      if (i.targetId === id && SEVERITY_RANK[i.severity] > SEVERITY_RANK[worst]) worst = i.severity;\n    });\n    return worst;\n  }\n  function overallStatus(){\n    let worst = \"operational\";\n    COMPONENTS.forEach(c => { const s = compStatus(c.id); if (SEVERITY_RANK[s] > SEVERITY_RANK[worst]) worst = s; });\n    return worst;\n  }\n  const STATUS_LABEL = { operational:\"Operational\", degraded:\"Degraded Performance\", outage:\"Outage\" };\n  const OVERALL_LABEL = { operational:\"All Systems Operational\", degraded:\"Degraded Performance\", outage:\"Service Outage\" };\n  const STATUS_CLS = { operational:\"ok\", degraded:\"degraded\", outage:\"outage\" };\n\n  function uptimePct(id){\n    const cells = [...HISTORY[id], compStatus(id) === \"outage\" ? \"ot\" : \"ok\"];\n    const counted = cells.filter(c => c !== \"nd\");\n    const red = counted.filter(c => c === \"ot\").length;\n    return (100 * (1 - red * 0.25 / counted.length)).toFixed(2);\n  }\n\n  function tplText(category, targetId){\n    const tpl = CATALOG[category].tpl;\n    if (targetId && chainById(targetId)) return tpl.replace(/\\{Chain\\}/g, chainById(targetId).name);\n    return tpl;\n  }\n  function incidentTitle(category, targetId){\n    const name = targetId ? (compById(targetId)?.name ?? \"\") : \"\";\n    return name ? `${name} — ${CATALOG[category].incidentLabel}` : CATALOG[category].incidentLabel;\n  }\n\n  // ============ 事件自动开 / 关 ============\n  function openIncident(category, targetId, source){\n    const exists = activeIncidents().find(i => i.category === category && (i.targetId ?? null) === (targetId ?? null));\n    if (exists) return exists;\n    const def = CATALOG[category];\n    const inc = {\n      id: `${category}:${targetId ?? \"_\"}:${Date.now()}`,\n      category, targetId: targetId ?? null, severity: def.severity, source,\n      status: \"investigating\",\n      title: incidentTitle(category, targetId),\n      text: tplText(category, targetId),\n      createdTs: Date.now(), resolvedTs: null\n    };\n    state.incidents.push(inc);\n    saveState(state); renderAll();\n    toast(`事件开启：${inc.title}`, def.severity === \"outage\" ? \"ot\" : \"dg\");\n    return inc;\n  }\n  function resolveIncident(category, targetId){\n    const inc = activeIncidents().find(i => i.category === category && (i.targetId ?? null) === (targetId ?? null));\n    if (!inc) return;\n    inc.status = \"resolved\"; inc.resolvedTs = Date.now();\n    saveState(state); renderAll();\n    toast(`Resolved：${inc.title}`);\n  }\n  function resolveIfActive(category, targetId){\n    const inc = activeIncidents().find(i => i.category === category && i.targetId === targetId);\n    if (inc) resolveIncident(category, targetId);\n  }\n\n  // ============ 自动信号一：链上确认延迟 ============\n  function setLatencyLevel(chainId, level){\n    state.latencyLevel[chainId] = level;\n    if (level !== \"dg\") resolveIfActive(\"chain_delay\", chainId);\n    if (level !== \"ot\") resolveIfActive(\"chain_severe_delay\", chainId);\n    saveState(state);\n    if (level === \"dg\") openIncident(\"chain_delay\", chainId, \"latency\");\n    else if (level === \"ot\") openIncident(\"chain_severe_delay\", chainId, \"latency\");\n    else renderAll();\n  }\n\n  // ============ 自动信号二：Swidge 可用性 ============\n  function setSwidge(up){\n    state.swidgeUp = up;\n    saveState(state);\n    if (!up) openIncident(\"swidge_down\", \"swidge\", \"swidge\");\n    else { resolveIfActive(\"swidge_down\", \"swidge\"); renderAll(); }\n  }\n\n  // ============ Tabs ============\n  const tabs = document.querySelectorAll(\".tab\");\n  const views = document.querySelectorAll(\".view\");\n  const showTab = (name) => {\n    tabs.forEach(t => t.classList.toggle(\"active\", t.dataset.tab === name));\n    views.forEach(v => v.classList.toggle(\"active\", v.dataset.view === name));\n  };\n  tabs.forEach(t => t.addEventListener(\"click\", () => showTab(t.dataset.tab)));\n\n  // ============ Helpers ============\n  const escapeHtml = s => (s ?? \"\").replace(/[&<>\"']/g, c => ({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":\"&#39;\"}[c]));\n  const fmtTime = ts => new Date(ts).toLocaleTimeString(\"en-US\",{hour:\"2-digit\",minute:\"2-digit\"});\n\n  // ============ Render: 对外页面 ============\n  function renderActiveIncidentCards(){\n    const el = document.querySelector(\"[data-active-incidents]\");\n    el.innerHTML = activeIncidents().map(i => {\n      const affect = compById(i.targetId)?.name ?? \"\";\n      return `\n        <div class=\"inc-card ${i.severity}\">\n          <div class=\"inc-card-head\">\n            <span class=\"inc-title\">${escapeHtml(i.title)}<\u002Fspan>\n            <span class=\"inc-chip\"><span class=\"spin\"><\u002Fspan>Investigating<\u002Fspan>\n            <span class=\"inc-affect\">Affected: ${escapeHtml(affect)}<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"inc-update\"><span class=\"ts mono\">${fmtTime(i.createdTs)}<\u002Fspan>${escapeHtml(i.text)}<\u002Fdiv>\n        <\u002Fdiv>`;\n    }).join(\"\");\n  }\n  function renderGlobalHealth(){\n    const el = document.querySelector(\"[data-global-health]\");\n    const s = overallStatus();\n    el.className = \"global-health \" + (s === \"operational\" ? \"ok\" : s);\n    el.querySelector(\".gh-text\").textContent = OVERALL_LABEL[s];\n  }\n  function compRow(c){\n    const s = compStatus(c.id);\n    const cells = [...HISTORY[c.id], s === \"outage\" ? \"ot\" : s === \"degraded\" ? \"dg\" : \"ok\"];\n    const bar = cells.map(cl => `<i class=\"${cl === \"ok\" ? \"\" : cl}\"><\u002Fi>`).join(\"\");\n    return `\n      <div class=\"comp-row\">\n        <div class=\"comp-top\">\n          <div class=\"comp-name-wrap\">\n            <div class=\"comp-icon\">${compLogo(c)}<\u002Fdiv>\n            <div>\n              <div class=\"comp-name\">${c.name}<\u002Fdiv>\n              ${c.desc ? `<div class=\"comp-desc\">${c.desc}<\u002Fdiv>` : \"\"}\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"comp-state ${STATUS_CLS[s]}\">\n            <span class=\"state-dot ${STATUS_CLS[s]}\"><\u002Fspan>\n            <span>${STATUS_LABEL[s]}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"uptime-bar\">${bar}<\u002Fdiv>\n        <div class=\"uptime-meta\"><span>90 days ago<\u002Fspan><b>${uptimePct(c.id)}% uptime<\u002Fb><span>Today<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>`;\n  }\n  function renderComponents(){\n    document.querySelector(\"[data-chains]\").innerHTML = CHAINS.map(c => compRow({...c, kind:\"chain\"})).join(\"\");\n    document.querySelector(\"[data-swidge]\").innerHTML = compRow({...SWIDGE, kind:\"swidge\"});\n  }\n  function renderUpdated(){\n    const el = document.querySelector(\"[data-updated]\");\n    if (el) el.textContent = new Date(state.updatedAt).toLocaleString(\"en-US\");\n  }\n\n  // ============ Render: 演示侧栏 ============\n  function renderMetricRows(){\n    const el = document.querySelector(\"[data-metric-rows]\");\n    el.innerHTML = CHAINS.map(c => {\n      const lv = state.latencyLevel[c.id];\n      const reading = lv === \"ok\" ? c.normal : lv === \"dg\" ? c.dg : c.ot;\n      return `\n        <div class=\"metric-row\">\n          <div class=\"metric-head\">\n            <span class=\"metric-name\">${c.name}<\u002Fspan>\n            <span class=\"metric-rate ${lv} mono\">${reading}<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-thresholds\">\n            <span><span class=\"thr ok\"><\u002Fspan>正常 ${c.normalRef}<\u002Fspan>\n            <span><span class=\"thr dg\"><\u002Fspan>${c.dgThresh}<\u002Fspan>\n            <span><span class=\"thr ot\"><\u002Fspan>${c.otThresh}<\u002Fspan>\n          <\u002Fdiv>\n          <span class=\"seg\">\n            <button data-latency=\"${c.id}|ok\" class=\"${lv==='ok'?'on-ok':''}\">正常<\u002Fbutton>\n            <button data-latency=\"${c.id}|dg\" class=\"${lv==='dg'?'on-dg':''}\">延迟<\u002Fbutton>\n            <button data-latency=\"${c.id}|ot\" class=\"${lv==='ot'?'on-ot':''}\">严重延迟<\u002Fbutton>\n          <\u002Fspan>\n        <\u002Fdiv>`;\n    }).join(\"\");\n    el.querySelectorAll(\"[data-latency]\").forEach(b => b.addEventListener(\"click\", () => {\n      const [id, lv] = b.dataset.latency.split(\"|\");\n      if (state.latencyLevel[id] !== lv) setLatencyLevel(id, lv);\n    }));\n  }\n  function renderSwidgeSim(){\n    const el = document.querySelector(\"[data-swidge-sim]\");\n    const up = state.swidgeUp;\n    el.innerHTML = `\n      <div class=\"metric-row\">\n        <div class=\"metric-head\">\n          <span class=\"metric-name\">Swidge<\u002Fspan>\n          <span class=\"metric-rate ${up ? 'ok' : 'ot'}\">${up ? \"可用\" : \"不可用\"}<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"metric-thresholds\">\n          <span><span class=\"thr ok\"><\u002Fspan>可用<\u002Fspan>\n          <span><span class=\"thr ot\"><\u002Fspan>不可用<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"seg\">\n          <button data-swidge-set=\"up\" class=\"${up?'on-ok':''}\">可用<\u002Fbutton>\n          <button data-swidge-set=\"down\" class=\"${!up?'on-ot':''}\">不可用<\u002Fbutton>\n        <\u002Fspan>\n      <\u002Fdiv>`;\n    el.querySelectorAll(\"[data-swidge-set]\").forEach(b => b.addEventListener(\"click\", () => {\n      const up = b.dataset.swidgeSet === \"up\";\n      if (state.swidgeUp !== up) setSwidge(up);\n    }));\n  }\n\n  // ============ Render: Admin 手动覆盖 ============\n  function renderManual(){\n    const el = document.querySelector(\"[data-manual]\");\n    el.innerHTML = COMPONENTS.map(c => {\n      const s = compStatus(c.id);\n      const twoState = c.kind === \"swidge\";\n      return `\n        <div class=\"manual-row\">\n          <span class=\"manual-left\">\n            <span class=\"manual-icon\">${compLogo(c)}<\u002Fspan>\n            <span class=\"manual-name\">${c.name}<small>${twoState ? \"Cross-Chain\" : \"Chain\"}<\u002Fsmall><\u002Fspan>\n          <\u002Fspan>\n          <span class=\"seg-light\">\n            <button data-manual-set=\"${c.id}|operational\" class=\"${s==='operational'?'on-ok':''}\"><span class=\"d ok\"><\u002Fspan>OK<\u002Fbutton>\n            ${twoState ? \"\" : `<button data-manual-set=\"${c.id}|degraded\" class=\"${s==='degraded'?'on-dg':''}\"><span class=\"d dg\"><\u002Fspan>Degraded<\u002Fbutton>`}\n            <button data-manual-set=\"${c.id}|outage\" class=\"${s==='outage'?'on-ot':''}\"><span class=\"d ot\"><\u002Fspan>Outage<\u002Fbutton>\n          <\u002Fspan>\n        <\u002Fdiv>`;\n    }).join(\"\");\n    el.querySelectorAll(\"[data-manual-set]\").forEach(b => b.addEventListener(\"click\", () => {\n      const [id, target] = b.dataset.manualSet.split(\"|\");\n      const current = compStatus(id);\n      if (current === target) return;\n      if (target === \"operational\") {\n        activeIncidents().filter(i => i.targetId === id).forEach(i => resolveIncident(i.category, i.targetId));\n        if (state.latencyLevel[id] !== undefined) state.latencyLevel[id] = \"ok\";\n        if (id === \"swidge\") state.swidgeUp = true;\n        saveState(state); renderAll();\n        return;\n      }\n      const isChain = !!chainById(id);\n      const cat = isChain ? (target === \"outage\" ? \"chain_severe_delay\" : \"chain_delay\") : \"swidge_down\";\n      activeIncidents().filter(i => i.targetId === id).forEach(i => resolveIncident(i.category, i.targetId));\n      const inc = {\n        id: `manual:${cat}:${id}:${Date.now()}`,\n        category: cat, targetId: id,\n        severity: target,\n        source: \"manual\", status: \"investigating\",\n        title: incidentTitle(cat, id),\n        text: tplText(cat, isChain ? id : null),\n        createdTs: Date.now(), resolvedTs: null\n      };\n      state.incidents.push(inc);\n      saveState(state); renderAll();\n      toast(`手动覆盖：${compById(id).name} → ${target === \"outage\" ? \"Outage\" : \"Degraded\"}`, target === \"outage\" ? \"ot\" : \"dg\");\n    }));\n  }\n\n  // ============ Render all ============\n  function renderAll(){\n    renderActiveIncidentCards();\n    renderGlobalHealth();\n    renderComponents();\n    renderUpdated();\n    renderMetricRows();\n    renderSwidgeSim();\n    renderManual();\n  }\n\n  // ============ Toast ============\n  const _toastTimers = new Map();\n  function toast(msg, kind=\"ok\"){\n    const key = `${kind}:${msg}`;\n    if (_toastTimers.has(key)) return;\n    const c = document.getElementById(\"toast-container\");\n    const el = document.createElement(\"div\");\n    el.className = \"toast\";\n    el.innerHTML = `<span class=\"toast-dot ${kind !== \"ok\" ? kind : \"\"}\"><\u002Fspan>${escapeHtml(msg)}`;\n    c.appendChild(el);\n    const t = setTimeout(() => { el.remove(); _toastTimers.delete(key); }, 2200);\n    _toastTimers.set(key, t);\n  }\n\n  renderAll();\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
