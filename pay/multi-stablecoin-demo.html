<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AllScale — Multi-Stablecoin Support Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--green:#009859;--green-hover:#0CAA67;--green-bg:#EAF9F1;--card:#FAFBFA;--btn:#F2F8F5;--border:#E5EEEA;--dark:#0C3124;--text:#83968F;--white:#FFFFFF;--usdt:#26A17B;--usdc:#2775CA;--dai:#F5AC37;--busd:#F0B90B;--red:#E5484D;--orange:#F5A623}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#F0F4F2;font-family:'Archivo',system-ui,sans-serif;font-size:14px;color:var(--dark);line-height:1.5;-webkit-font-smoothing:antialiased;letter-spacing:-0.02em}

  .topbar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(12,49,36,.04)}
  .topbar-logo{width:28px;height:28px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;flex-shrink:0}
  .topbar-title{font-size:15px;font-weight:600;color:var(--dark);flex:1}
  .topbar-title span{color:var(--text);font-weight:400;font-size:13px;margin-left:6px}
  .mode-btns{display:flex;gap:6px}
  .mode-btn{padding:8px 16px;border:1.5px solid var(--border);border-radius:50px;background:var(--white);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Archivo',sans-serif}
  .mode-btn:hover{border-color:var(--green);color:var(--dark)}
  .mode-btn.active{background:var(--green);border-color:var(--green);color:white;font-weight:600}

  .container{max-width:960px;margin:0 auto;padding:20px}
  .section-block{margin-bottom:36px}
  .section-title{font-size:11px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-left:4px}
  .compare-row{display:flex;gap:16px;align-items:flex-start}
  .compare-col{flex:1;min-width:0}
  .col-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:5px 12px;border-radius:50px;display:inline-block;margin-bottom:10px}
  .col-label.current{background:#FEF3E2;color:var(--orange)}
  .col-label.proposed{background:var(--green-bg);color:var(--green)}

  .card{background:var(--white);border:1px solid var(--border);border-radius:27px;padding:22px 18px;position:relative;overflow:hidden;}
  .screenshot-card{background:var(--white);border:1px solid var(--border);border-radius:27px;overflow:hidden;display:flex;flex-direction:column}
  .screenshot-card img{width:100%;height:auto;display:block}

  /* ── Highlight ── */
  .hl{border:2px dashed var(--green);border-radius:16px;padding:12px;background:rgba(0,152,89,.03);margin:8px 0}
  .hl-label{font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}

  /* ── Coin ── */
  .coin-icon{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:white;flex-shrink:0;vertical-align:middle}
  .coin-icon.usdt{background:var(--usdt)}.coin-icon.usdc{background:var(--usdc)}.coin-icon.dai{background:var(--dai)}.coin-icon.busd{background:var(--busd)}
  .coin-icon.lg{width:32px;height:32px;font-size:14px}

  /* ── Wallet ── */
  .wallet-center{text-align:center;padding:8px 0 16px}
  .bal-label{font-size:14px;color:#0C3124;font-weight:400;margin-bottom:4px}
  .bal-amount{font-weight:600;color:var(--dark);letter-spacing:-0.04em;line-height:1.1;display:flex;align-items:center;justify-content:center;gap:4px;}
  .bal-amount .bal-nums{display:flex;align-items:baseline;gap:0;}
  .bal-amount .whole{font-size:54px;letter-spacing:-3px;}
  .bal-amount .dec{font-size:28px;color:var(--text)}
  .bal-toggle{display:flex;align-items:center;flex-shrink:0;}
  .bal-toggle img{transition:transform 0.3s ease;transform:rotate(180deg);}
  .bal-toggle.open img{transform:rotate(0deg);}
  .bal-amount{cursor:pointer;}
  .pills-wrap{overflow:hidden;max-height:200px;opacity:1;transition:max-height 0.35s ease,opacity 0.25s ease,margin-top 0.3s ease;}
  .pills-wrap.collapsed{max-height:0;opacity:0;margin-top:0 !important;}
  .asset-pill{display:inline-flex;align-items:center;gap:10px;padding:8px 12px;border-radius:40px;background:var(--btn);cursor:pointer}
  .asset-pill-info{display:flex;flex-direction:column;align-items:flex-start;}
  .asset-pill-text{font-size:16px;font-weight:600;color:var(--dark)}
  .asset-pill-sub{font-size:12px;color:var(--text)}
  .action-btns{display:flex;gap:8px;margin-top:16px;justify-content:center}
  .action-btn{border-radius:50px;font-family:'Archivo',sans-serif;font-size:16px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 14px;}
  .action-btn.primary{background:var(--green);color:var(--btn)}
  .action-btn.secondary{background:#FAFBFA;color:var(--dark);border:none;}

  /* ── Deposit Steps ── */
  .popup-title{font-size:28px;font-weight:500;color:#0C3124;margin-bottom:24px;letter-spacing:-0.02em;}
  .step-block{margin-bottom:0;padding:20px 0;}
  .step-divider{height:1px;background:#E5EEEA;margin:0;}
  .step-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .step-num{width:32px;height:32px;border-radius:50%;background:#F2F8F5;color:#009859;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .step-desc{font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .step-warn{font-size:13px;color:#E53E3E;margin-top:10px;line-height:1.5;}
  .dep-token-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:50px;background:#FAFBFA;display:inline-flex;}
  .dep-token-wrap{display:flex;gap:10px;flex-wrap:wrap;}
  .dep-token-name{font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .dep-net-btn{width:100%;display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;background:#FAFBFA;border:none;cursor:pointer;font-family:'Archivo',sans-serif;transition:background 0.2s ease;}
  .dep-net-btn:hover{background:#F2F8F5;}
  .net-sheet-subtitle{font-size:14px;color:#83968F;padding:0 20px 20px;font-weight:500;line-height:1.0;}
  .dep-net-label{font-size:16px;font-weight:500;color:#0C3124;flex:1;text-align:left;letter-spacing:-0.02em;}
  .dep-net-chevron{color:#83968F;font-size:18px;}
  .addr-block{background:#FAFBFA;border-radius:14px;border:1.5px solid #E5EEEA;padding:14px 16px;font-size:13px;font-family:'DM Mono','SF Mono',monospace;color:#0C3124;word-break:break-all;margin-bottom:12px;line-height:1.6;}
  .addr-btns{display:flex;flex-direction:column;gap:8px;}
  .addr-btn-primary{width:100%;padding:14px;border-radius:50px;border:none;background:#009859;font-family:'Archivo',sans-serif;font-size:16px;font-weight:500;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-0.02em;transition:background 0.2s ease;}
  .addr-btn-primary:hover{background:#0B8B4D;}
  .addr-btn-secondary{width:100%;padding:14px;border-radius:50px;border:none;background:#FAFBFA;font-family:'Archivo',sans-serif;font-size:16px;font-weight:500;color:#0C3124;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-0.02em;text-decoration:none;transition:background 0.2s ease;}
  .addr-btn-secondary:hover{background:#F2F8F5;}

  /* ── Network Picker Bottom Sheet ── */
  .net-sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.25);border-radius:27px;opacity:0;pointer-events:none;transition:opacity 0.25s ease;z-index:20;}
  .net-sheet-overlay.open{opacity:1;pointer-events:all;}
  .net-sheet{position:absolute;left:8px;right:8px;bottom:16px;background:#FFFFFF;border-radius:24px;padding:0;overflow:hidden;transform:translateY(calc(100% + 32px));transition:transform 0.32s cubic-bezier(0.32,0.72,0,1),opacity 0.22s ease;opacity:0;z-index:21;}
  .net-sheet.open{transform:translateY(0);opacity:1;}
  .net-sheet-handle{width:36px;height:4px;background:#E5EEEA;border-radius:99px;margin:12px auto 0;}
  .net-sheet-header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;}
  .net-sheet-title{font-size:24px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;line-height:1.2;}
  .net-sheet-close{width:32px;height:32px;border-radius:50%;background:#F2F8F5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0C3124;flex-shrink:0;}
  .net-sheet-close:hover{background:#E5EEEA;}
  .net-sheet-subtitle{font-size:14px;color:#83968F;padding:0 20px 20px;font-weight:500;line-height:1.5;}
  .net-sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 24px;}
  .net-sheet-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:50px;background:#FAFBFA;cursor:pointer;transition:background 0.12s;}
  .net-sheet-item:hover{background:#F2F8F5;}
  .net-sheet-item-name{font-size:18px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}

  /* ── Withdraw Token Picker Sheet ── */
  .wd-sheet-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.25);border-radius:27px;opacity:0;pointer-events:none;transition:opacity 0.25s ease;z-index:20;}
  .wd-sheet-overlay.open{opacity:1;pointer-events:all;}
  .wd-sheet{position:absolute;left:8px;right:8px;bottom:16px;max-height:538px;background:#FFFFFF;border-radius:24px;overflow:hidden;transform:translateY(calc(100% + 32px));transition:transform 0.32s cubic-bezier(0.32,0.72,0,1),opacity 0.22s ease,height 0.3s cubic-bezier(0.32,0.72,0,1);opacity:0;z-index:21;display:flex;flex-direction:column;}
  .wd-sheet.open{transform:translateY(0);opacity:1;}
  .wd-sheet-header{padding:20px 20px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .wd-sheet-title{font-size:24px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .wd-sheet-close{width:32px;height:32px;border-radius:50%;background:#F2F8F5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0C3124;flex-shrink:0;}
  .wd-sheet-close:hover{background:#E5EEEA;}
  .wd-sheet-subtitle{font-size:14px;color:#83968F;padding:0 20px 12px;font-weight:500;line-height:1.5;flex-shrink:0;}
  .wd-sheet-tabs{display:flex;gap:8px;padding:0 20px 16px;flex-shrink:0;}
  .wd-sheet-tab{display:inline-flex;align-items:center;gap:8px;padding:8px 16px 8px 10px;border-radius:50px;border:1.5px solid #E5EEEA;background:#FAFBFA;cursor:pointer;transition:all .15s;font-size:16px;font-weight:500;color:#83968F;letter-spacing:-0.02em;font-family:'Archivo',sans-serif;}
  .wd-sheet-tab.active{border-color:#009859;background:#F2F8F5;color:#009859;}
  .wd-sheet-tab img{width:24px;height:24px;display:block;}
  .wd-sheet-list{overflow-y:auto;flex:1;padding:0 16px 20px;}
  .wd-sheet-item{display:flex;align-items:center;gap:12px;padding:12px 4px;border-bottom:1px solid #E5EEEA;cursor:pointer;transition:background .12s;border-radius:8px;}
  .wd-sheet-item:last-child{border-bottom:none;}
  .wd-sheet-item:hover{background:#FAFBFA;}
  .wd-sheet-item-info{flex:1;}
  .wd-sheet-item-name{font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .wd-sheet-item-sub{font-size:13px;color:#83968F;font-weight:500;margin-top:2px;}
  .wd-sheet-item-bal{text-align:right;}
  .wd-sheet-item-bal-main{font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .wd-sheet-item-bal-sub{font-size:13px;color:#83968F;font-weight:500;margin-top:2px;}

  /* ── Withdraw NEW ── */
  .wd-section{background:#FAFBFA;border-radius:16px;padding:16px;margin-bottom:12px;}
  .wd-section-label{display:inline-block;font-size:13px;color:var(--green);font-weight:500;margin-bottom:12px;background:#F2F8F5;padding:4px 6px;border-radius:10px;}
  .wd-token-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#FAFBFA;border-radius:12px;border:1px solid #E5EEEA;cursor:pointer;transition:border-color .15s;}
  .wd-token-row:hover{border-color:var(--green);}
  .wd-token-icon-wrap{position:relative;width:28px;height:28px;flex-shrink:0;}
  .wd-token-icon-wrap img{width:28px;height:28px;border-radius:0;display:block;}
  .wd-token-name{flex:1;font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .wd-token-chevron{color:#83968F;font-size:18px;}

  .wd-amount-section{background:#FAFBFA;border-radius:16px;padding:16px;margin-bottom:12px;}
  .wd-amount-label{display:inline-block;font-size:13px;color:var(--green);font-weight:500;margin-bottom:12px;background:#F2F8F5;padding:4px 6px;border-radius:10px;}
  .wd-amount-row{display:flex;align-items:center;gap:8px;}
  .wd-amount-inner{display:flex;align-items:baseline;flex:1;min-width:0;gap:6px;}
  .wd-amount-input{font-size:38px;font-weight:500;color:#0C3124;letter-spacing:-0.03em;line-height:1;border:none;background:transparent;outline:none;font-family:'Archivo',sans-serif;min-width:1ch;width:1ch;}
  .wd-amount-sizer{position:absolute;visibility:hidden;pointer-events:none;font-size:38px;font-weight:500;font-family:'Archivo',sans-serif;letter-spacing:-0.03em;white-space:pre;}
  .wd-amount-unit{font-size:38px;font-weight:500;color:#83968F;letter-spacing:-0.03em;white-space:nowrap;flex-shrink:0;}
  .wd-max-btn{padding:6px 14px;border-radius:50px;border:none;background:transparent;color:#0C3124;font-family:'Archivo',sans-serif;font-size:16px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:-0.02em;}
  .wd-max-btn:hover{background:transparent;}
  .wd-avail{font-size:13px;color:#83968F;margin-top:8px;font-weight:500;}
  .wd-avail span{color:#83968F;}

  .wd-to-section{background:#FAFBFA;border-radius:16px;padding:16px;margin-bottom:12px;}
  .wd-to-label{display:inline-block;font-size:13px;color:var(--green);font-weight:500;margin-bottom:12px;background:#F2F8F5;padding:4px 6px;border-radius:10px;}
  .wd-to-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#FAFBFA;border-radius:12px;border:1px solid #E5EEEA;cursor:pointer;transition:border-color .15s;}
  .wd-to-row:hover{border-color:var(--green);}
  .wd-to-text{flex:1;font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .wd-to-chevron{color:#83968F;font-size:18px;}

  .wd-fees{padding:4px 0 12px;}
  .wd-fee-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
  .wd-fee-label{font-size:16px;font-weight:500;color:#83968F;letter-spacing:-0.02em;}
  .wd-fee-value{font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;}
  .wd-fee-row.total .wd-fee-label{color:#0C3124;}
  .wd-fee-row.total .wd-fee-value{color:#009859;}
  .wd-fee-skeleton{height:16px;width:72px;border-radius:8px;background:linear-gradient(90deg,#E5EEEA 25%,#F2F8F5 50%,#E5EEEA 75%);background-size:200% 100%;animation:skeletonShimmer 1.2s infinite;}
  @keyframes skeletonShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .btn-primary{width:100%;height:52px;border-radius:50px;border:none;background:var(--green);color:#FFFFFF;font-family:'Archivo',sans-serif;font-size:16px;font-weight:500;cursor:pointer;letter-spacing:-0.02em;transition:background .15s;}
  .btn-primary:hover{background:#0B8B4D;}
  .btn-primary[style*="pointer-events: none"]:hover,.btn-primary[style*="pointer-events:none"]:hover{background:var(--green);}
  .btn-disabled{background:var(--border);color:var(--text);cursor:default;}

  .wd-to{background:var(--card);border-radius:16px;padding:14px;margin-bottom:14px}
  .wd-to-icon{width:32px;height:32px;border-radius:10px;background:var(--btn);display:flex;align-items:center;justify-content:center;font-size:16px}
  .wd-token-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 16px 10px 10px;border-radius:50px;background:var(--white);border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
  .wd-token-pill:hover{border-color:var(--green)}
  .wd-token-pill .chain-badge{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--white);margin-left:-18px;margin-right:4px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:white}
  .wd-token-pill-name{font-size:14px;font-weight:500;color:var(--dark)}

  /* ── Withdraw Asset List ── */
  .asset-list-item{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:8px}
  .asset-list-item:last-child{border-bottom:none}
  .asset-list-item:hover{background:var(--btn)}
  .ali-icon-stack{position:relative;width:36px;height:36px;flex-shrink:0}
  .ali-icon-stack .coin-icon{position:absolute;top:0;left:0;width:32px;height:32px;font-size:13px}
  .ali-icon-stack .chain-mini{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;border-radius:50%;border:2px solid var(--white);display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:white}
  .ali-info{flex:1}
  .ali-name{font-size:14px;font-weight:500;color:var(--dark)}
  .ali-sub{font-size:11px;color:var(--text)}
  .ali-bal{text-align:right}
  .ali-bal-main{font-size:14px;font-weight:600;color:var(--dark)}
  .ali-bal-sub{font-size:11px;color:var(--text)}

  /* ── Activity ── */
  .act-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
  .act-item:last-child{border-bottom:none}
  .act-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
  .act-icon.dep{background:var(--green-bg);color:var(--green)}
  .act-icon.wd{background:#FEF3E2;color:var(--orange)}
  .act-info{flex:1}
  .act-type{font-size:13px;font-weight:500}
  .act-date{font-size:11px;color:var(--text)}
  .act-amt{font-size:13px;font-weight:600;text-align:right}
  .act-amt.pos{color:var(--green)}

  /* ── Invoice ── */
  .inv-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
  .inv-item:last-child{border-bottom:none}
  .inv-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .inv-icon.in{background:var(--green-bg);color:var(--green)}
  .inv-info{flex:1}
  .inv-party{font-size:13px;font-weight:500}
  .inv-meta{font-size:11px;color:var(--text);margin-top:1px}
  .inv-amt{font-size:14px;font-weight:600;text-align:right}
  .inv-amt.pos{color:var(--green)}
  .badge{display:inline-flex;padding:1px 7px;border-radius:50px;font-size:10px;font-weight:600}
  .badge-usdt{background:rgba(38,161,123,.1);color:var(--usdt)}
  .badge-usdc{background:rgba(39,117,202,.1);color:var(--usdc)}



  .divider{height:1px;background:var(--border);margin:14px 0}

  #toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
  .toast{background:#FAFBFA;border:1px solid #E5EEEA;border-radius:28px;padding:12px 16px;font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;box-shadow:0 8px 40px rgba(0,0,0,0.10);display:inline-flex;align-items:center;gap:10px;pointer-events:auto;animation:toastIn 0.25s ease;white-space:nowrap;}
  @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .card-toast{position:absolute;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:#FAFBFA;border:1px solid #E5EEEA;border-radius:28px;padding:12px 16px;font-family:'Archivo',sans-serif;font-size:16px;font-weight:500;color:#0C3124;letter-spacing:-0.02em;box-shadow:0 8px 40px rgba(0,0,0,0.10);display:inline-flex;align-items:center;gap:10px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.25s ease,transform 0.25s ease;z-index:30;}
  .card-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:700px){.compare-row{flex-direction:column}.compare-col{width:100%}}

/* ─── Network Sheet ─── */
function openNetSheet(btn) {
  const card    = btn.closest('.card');
  const overlay = card.querySelector('#dep-net-overlay');
  const sheet   = card.querySelector('#dep-net-sheet');
  if (!overlay || !sheet) return;
  overlay.classList.add('open');
  sheet.getBoundingClientRect();
  sheet.classList.add('open');
  initSheetDrag(sheet, overlay);
}

function closeNetSheet() {
  document.querySelectorAll('#dep-net-sheet').forEach(sheet => {
    sheet.style.transition = '';
    sheet.classList.remove('open');
  });
  document.querySelectorAll('#dep-net-overlay').forEach(overlay => {
    overlay.classList.remove('open');
  });
}

function initSheetDrag(sheet, overlay) {
  // avoid double-binding
  if (sheet._dragBound) return;
  sheet._dragBound = true;

  let startY = 0, currentY = 0, dragging = false;

  function onStart(e) {
    startY   = e.touches ? e.touches[0].clientY : e.clientY;
    currentY = 0;
    dragging = true;
    sheet.style.transition = 'none';
  }

  function onMove(e) {
    if (!dragging) return;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    currentY = Math.max(0, y - startY); // only downward
    sheet.style.transform = `translateY(${currentY}px)`;
    // fade overlay proportionally
    const sheetH = sheet.offsetHeight;
    const ratio  = Math.max(0, 1 - currentY / sheetH);
    overlay.style.opacity = (0.25 * ratio).toString();
  }

  function onEnd() {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';
    const threshold = sheet.offsetHeight * 0.35;
    if (currentY > threshold) {
      // dismiss
      sheet.style.transform = `translateY(calc(100% + 32px))`;
      overlay.style.opacity = '0';
      setTimeout(() => {
        sheet.classList.remove('open');
        overlay.classList.remove('open');
        sheet.style.transform = '';
        overlay.style.opacity = '';
      }, 320);
    } else {
      // snap back
      sheet.style.transform = '';
      overlay.style.opacity = '';
    }
  }

  sheet.addEventListener('touchstart', onStart, { passive: true });
  sheet.addEventListener('touchmove',  onMove,  { passive: true });
  sheet.addEventListener('touchend',   onEnd);
  sheet.addEventListener('mousedown',  onStart);
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onEnd);
}

/* ─── Toggle pills ─── */
function togglePills(balEl) {
  const toggle = balEl.querySelector('.bal-toggle');
  const pills  = balEl.closest('.wallet-center').querySelector('.pills-wrap');
  if (!pills) return;
  const isOpen = toggle.classList.contains('open');
  if (isOpen) {
    toggle.classList.remove('open');
    pills.classList.add('collapsed');
  } else {
    toggle.classList.add('open');
    pills.classList.remove('collapsed');
  }
}

function toast(msg, type = 'success') {
  const key = `${type}:${msg}`;
  if (_toastTimers.has(key)) return;
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<img src="../checkout/assets/check.svg" width="24" height="24" style="display:block;flex-shrink:0;">${msg}`;
  container.appendChild(el);
  const timer = setTimeout(() => { el.remove(); _toastTimers.delete(key); }, 3500);
  _toastTimers.set(key, timer);
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); toast('Address copied', 'success'); }
  catch (e) { toast('Copy failed', 'error'); }
  document.body.removeChild(ta);
}

function copyDepositAddress(btn) {
  const address = '0xD79f6476db5887a415806aB3A06FF15FFf5d50ed';
  const cardToast = btn.closest('.card').querySelector('#dep-card-toast');
  function showCardToast() {
    if (!cardToast) return;
    clearTimeout(cardToast._t);
    cardToast.classList.add('show');
    cardToast._t = setTimeout(() => cardToast.classList.remove('show'), 3500);
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(address).then(showCardToast).catch(showCardToast);
  } else {
    const ta = document.createElement('textarea');
    ta.value = address;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    showCardToast();
  }
}

/* ── Withdraw amount input ── */
let _wdFeeTimer = null;
function onWdAmountInput(input) {
  // Allow only digits and at most one decimal point
  let v = input.value.replace(/[^0-9.]/g, '');
  const parts = v.split('.');
  if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
  if (input.value !== v) input.value = v;

  // Sync input width to content
  const sizer = document.getElementById('wd-amount-sizer');
  if (sizer) { sizer.textContent = v || '0'; input.style.width = sizer.offsetWidth + 'px'; }

  const feesEl = document.getElementById('wd-fees');
  if (!feesEl) return;

  const num = parseFloat(v);
  const btn = document.getElementById('wd-submit-btn');

  if (!v || isNaN(num) || num === 0) {
    feesEl.style.display = 'none';
    if (btn) { btn.textContent = 'Withdraw'; btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; btn.style.cursor = 'default'; }
    return;
  }

  // Enable button, show skeleton
  if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; btn.style.cursor = 'pointer'; btn.textContent = 'Withdraw'; }
  feesEl.style.display = '';
  document.getElementById('wd-net-fee').innerHTML = '<div class="wd-fee-skeleton"></div>';
  document.getElementById('wd-svc-fee').innerHTML = '<div class="wd-fee-skeleton"></div>';
  document.getElementById('wd-total-fee').innerHTML = '<div class="wd-fee-skeleton"></div>';

  clearTimeout(_wdFeeTimer);
  _wdFeeTimer = setTimeout(() => {
    const netFee = 0;
    const svcFee = Math.round(Math.random() * 99) / 100;
    const total = num + netFee + svcFee;
    document.getElementById('wd-net-fee').textContent = '$' + netFee.toFixed(2);
    document.getElementById('wd-svc-fee').textContent = '$' + svcFee.toFixed(2);
    document.getElementById('wd-total-fee').textContent = total.toFixed(2) + ' ' + _wdCoin;
    if (btn) btn.textContent = 'Withdraw • ' + total.toFixed(2) + ' ' + _wdCoin;
  }, 1000);
}

  renderWdListSheetList(_wdListCoin);

  overlay.classList.add('open');
  sheet.getBoundingClientRect();
  sheet.classList.add('open');
  initSheetDrag(sheet, overlay);
}

function closeWdListSheet() {
  const sheet = document.getElementById('wd-list-sheet');
  const overlay = document.getElementById('wd-list-overlay');
  if (sheet) { sheet.style.transition = ''; sheet.classList.remove('open'); }
  if (overlay) overlay.classList.remove('open');
}

function renderWdListSheetList(coin, animate) {
  const list = document.getElementById('wd-list-sheet-list');
  const sheet = document.getElementById('wd-list-sheet');
  if (!list) return;
  const hideSmall = document.getElementById('wd-list-hide-small');
  const tokens = hideSmall && hideSmall.checked
    ? WD_TOKENS[coin].filter(t => parseFloat(t.bal.replace(/,/g,'')) >= 1)
    : WD_TOKENS[coin];
  if (animate && sheet) {
    const prevH = sheet.offsetHeight;
    sheet.style.transition = 'none';
    sheet.style.height = 'auto';
    const newH = Math.min(sheet.scrollHeight, 538);
    sheet.style.height = prevH + 'px';
    requestAnimationFrame(() => { sheet.style.transition = ''; sheet.style.height = newH + 'px'; });
  }
  list.innerHTML = tokens.map(t => `
    <div class="wd-sheet-item" onclick="selectWdListToken('${coin}','${t.chain}','${t.img}')">
      <img src="asset/asset-token/${t.img}" width="34" height="34" style="display:block;flex-shrink:0;">
      <div class="wd-sheet-item-info">
        <div class="wd-sheet-item-name">${t.chain}</div>
        <div class="wd-sheet-item-sub">${coin}</div>
      </div>
      <div class="wd-sheet-item-bal">
        <div class="wd-sheet-item-bal-main">${t.bal} ${coin}</div>
        <div class="wd-sheet-item-bal-sub">${t.usd}</div>
      </div>
    </div>`).join('');
}

function switchWdListTab(coin) {
  _wdListCoin = coin;
  document.getElementById('wd-list-tab-usdt').classList.toggle('active', coin === 'USDT');
  document.getElementById('wd-list-tab-usdc').classList.toggle('active', coin === 'USDC');
  renderWdListSheetList(coin, true);
}

function toggleWdListHide(label) {
  const cb = document.getElementById('wd-list-hide-small');
  const icon = document.getElementById('wd-list-hide-icon');
  if (!cb || !icon) return;
  cb.checked = !cb.checked;
  icon.src = cb.checked ? 'asset/checked.svg' : 'asset/uncheck.svg';
  renderWdListSheetList(_wdListCoin, true);
}

function selectWdListToken(coin, chain, img) {
  _wdListCoin = coin;
  const tokenData = WD_TOKENS[coin].find(t => t.chain === chain);
  const tokenImg = document.getElementById('wd-list-token-img');
  const tokenName = document.getElementById('wd-list-token-name');
  if (tokenImg) tokenImg.src = 'asset/asset-token/' + img;
  if (tokenName) tokenName.textContent = chain + ' — ' + coin;
  const availEl = document.getElementById('wd-list-avail');
  if (availEl && tokenData) availEl.innerHTML = 'Available: <span>' + tokenData.bal + ' ' + coin + '</span>';
  const unitEl = document.getElementById('wd-list-amount-unit');
  if (unitEl) unitEl.textContent = coin;
  const input = document.getElementById('wd-list-amount-input');
  if (input) { input.value = '0'; onWdListAmountInput(input); }
  closeWdListSheet();
}

function onWdListAmountInput(input) {
  let v = input.value.replace(/[^0-9.]/g, '');
  const parts = v.split('.');
  if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
  if (input.value !== v) input.value = v;
  const sizer = document.getElementById('wd-list-amount-sizer');
  if (sizer) { sizer.textContent = v || '0'; input.style.width = sizer.offsetWidth + 'px'; }
  const feesEl = document.getElementById('wd-list-fees');
  const btn = document.getElementById('wd-list-submit-btn');
  if (!feesEl) return;
  const num = parseFloat(v);
  if (!v || isNaN(num) || num === 0) {
    feesEl.style.display = 'none';
    if (btn) { btn.textContent = 'Withdraw'; btn.style.opacity = '0.5'; btn.style.pointerEvents = 'none'; btn.style.cursor = 'default'; }
    return;
  }
  if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; btn.style.cursor = 'pointer'; btn.textContent = 'Withdraw'; }
  feesEl.style.display = '';
  document.getElementById('wd-list-net-fee').innerHTML = '<div class="wd-fee-skeleton"></div>';
  document.getElementById('wd-list-svc-fee').innerHTML = '<div class="wd-fee-skeleton"></div>';
  document.getElementById('wd-list-total-fee').innerHTML = '<div class="wd-fee-skeleton"></div>';
  clearTimeout(_wdListFeeTimer);
  _wdListFeeTimer = setTimeout(() => {
    const netFee = 0, svcFee = Math.round(Math.random() * 99) / 100;
    const total = num + netFee + svcFee;
    document.getElementById('wd-list-net-fee').textContent = '$' + netFee.toFixed(2);
    document.getElementById('wd-list-svc-fee').textContent = '$' + svcFee.toFixed(2);
    document.getElementById('wd-list-total-fee').textContent = total.toFixed(2) + ' ' + _wdListCoin;
    if (btn) btn.textContent = 'Withdraw • ' + total.toFixed(2) + ' ' + _wdListCoin;
  }, 1000);
}

function selectInvoiceCoin(el, groupId) {
  const group = document.getElementById(groupId);
  if (!group) return;
  group.querySelectorAll('[data-coin]').forEach(item => {
    const isActive = item === el;
    item.style.borderColor = isActive ? 'var(--green)' : 'var(--border)';
    item.style.background  = isActive ? 'var(--green-bg)' : 'var(--white)';
  });
}

function toggleInvAcceptsCustom(on){
  const inh = document.getElementById('inv-accepts-inherited');
  const cust = document.getElementById('inv-accepts-custom');
  if(!inh || !cust) return;
  inh.style.display  = on ? 'none' : 'flex';
  cust.style.display = on ? 'block' : 'none';
  // Reset chips to all-selected when (re)opening custom mode
  if(on){
    const group = document.getElementById('inv-editor-coins');
    if(group){
      group.querySelectorAll('[data-coin]').forEach(chip=>{
        chip.dataset.active = '1';
        chip.style.borderColor = 'var(--green)';
        chip.style.background  = 'var(--green-bg)';
      });
      updateInvoiceCustomHint();
    }
  }
}

function toggleInvoiceCustomCoin(el){
  const group = document.getElementById('inv-editor-coins');
  if(!group) return;
  const isActive = el.dataset.active === '1';
  const activeCount = group.querySelectorAll('[data-active="1"]').length;
  // Rule 2: min 1 selected — can't deselect the last one
  if(isActive && activeCount <= 1){
    // Brief shake to signal "can't deselect"
    el.animate(
      [{transform:'translateX(0)'},{transform:'translateX(-3px)'},{transform:'translateX(3px)'},{transform:'translateX(0)'}],
      {duration:200}
    );
    return;
  }
  const next = isActive ? '0' : '1';
  el.dataset.active = next;
  el.style.borderColor = next==='1' ? 'var(--green)' : 'var(--border)';
  el.style.background  = next==='1' ? 'var(--green-bg)' : 'var(--white)';
  updateInvoiceCustomHint();
}

function updateInvoiceCustomHint(){
  const group = document.getElementById('inv-editor-coins');
  const hint  = document.getElementById('inv-editor-coins-hint');
  if(!group || !hint) return;
  const total  = group.querySelectorAll('[data-coin]').length;
  const active = group.querySelectorAll('[data-active="1"]').length;
  if(active === total){
    // Rule 3: all selected ≡ default
    hint.textContent = 'All selected — equivalent to default. Will not be saved as an override.';
    hint.style.color = 'var(--text)';
  } else {
    const picked = Array.from(group.querySelectorAll('[data-active="1"]')).map(c=>c.dataset.coin).join(', ');
    hint.textContent = `This invoice will only accept ${picked}. Setting stays unchanged.`;
    hint.style.color = '#7A6600';
  }
}

render();
// Init withdraw input widths
(function(){
  const i=document.getElementById('wd-amount-input'); if(i) onWdAmountInput(i);
  const j=document.getElementById('wd-list-amount-input'); if(j) onWdListAmountInput(j);
  // Auto-open sheet in token list card
  setTimeout(() => {
    const listCard = document.getElementById('wd-list-card');
    if (listCard) {
      const overlay = listCard.querySelector('#wd-list-overlay');
      const sheet = listCard.querySelector('#wd-list-sheet');
      if (overlay && sheet) {
        renderWdListSheetList(_wdListCoin);
        sheet.style.height = Math.min(sheet.scrollHeight, 538) + 'px';
        overlay.classList.add('open');
        sheet.getBoundingClientRect();
        sheet.classList.add('open');
        initSheetDrag(sheet, overlay);
      }
    }
  }, 50);
})();
</script>

      </button>

    </div>
  </div>
</div>

<script>
let s315SelectedCoin = 0;

function openInvoiceSetting() {
  renderS315CoinOpts();
  const overlay = document.getElementById('s315-overlay');
  overlay.classList.remove('closing');
  overlay.classList.add('open');
}
function closeInvoiceSetting() {
  const overlay = document.getElementById('s315-overlay');
  if (!overlay.classList.contains('open')) return;
  overlay.classList.add('closing');
  overlay.addEventListener('animationend', function h() {
    overlay.classList.remove('open', 'closing');
    overlay.removeEventListener('animationend', h);
  }, { once: true });
}
function renderS315CoinOpts() {
  const list = coins();
  const opts = ['All', ...list];
  const container = document.getElementById('s315-coin-opts');
  container.innerHTML = opts.map((c, i) => {
    const isActive = i === s315SelectedCoin;
    const iconMap = { USDC: 'asset/usdc.png', USDT: 'asset/usdt.png' };
    const icon = iconMap[c] ? `<img src="${iconMap[c]}" width="24" height="24" style="border-radius:50%;flex-shrink:0;">` : '';
    return `<div class="s315-coin-opt${isActive ? ' active' : ''}" onclick="s315SelectCoin(${i})">
      ${icon}<span style="font-size:15px;font-weight:500;color:#0C3124;">${c}</span>
    </div>`;
  }).join('');
}
function s315SelectCoin(i) {
  s315SelectedCoin = i;
  renderS315CoinOpts();
}
</script>
